];

// ═══════════════════════════════════════════════════════
// 今日總覽
// ═══════════════════════════════════════════════════════
function TodayOverview({ diaryData, tasks, habitData, examHw, courses, semester }) {
  const todayStr = fmt(new Date());
  const todayDate = new Date();

  // Today's mood
  const todayMood = diaryData.find(d => d.date === todayStr);

  // Today's tasks
  const todayTasks = tasks.filter(t => t.date === todayStr)
    .sort((a,b) => (a.startTime||"") > (b.startTime||"") ? 1 : -1);
  const doneTasks = todayTasks.filter(t => t.done).length;

  // This week's habits
  const key = `${todayDate.getFullYear()}-${String(todayDate.getMonth()+1).padStart(2,"0")}`;
  const monthHabits = habitData?.habits?.[key] || [];
  const checks = habitData?.checks || {};
  const day = todayDate.getDate();

  // Upcoming exams/homework (next 7 days)
  const upcoming = examHw.filter(e => {
    const d = e.time || e.deadline;
    if (!d) return false;
    const dt = new Date(d);
    const diff = (dt - todayDate) / (1000*60*60*24);
    return diff >= 0 && diff <= 7;
  }).sort((a,b) => (a.time||a.deadline) > (b.time||b.deadline) ? 1 : -1);

  // Today's courses
  const DOW_MAP = { 0:"週日",1:"週一",2:"週二",3:"週三",4:"週四",5:"週五",6:"週六" };
  const todayDay = DOW_MAP[todayDate.getDay()];
  const todayCourses = courses.filter(c =>
    c.semester === semester && c.day === todayDay
  ).sort((a,b) => (a.startTime||"") > (b.startTime||"") ? 1 : -1);

  const [taskTypes] = useStorage("task-types", []);
  const getType = (typeId) => taskTypes.find(t => t.id === typeId);

  return (
    <div>
      {/* Header */}
      <div style={{
        background: `linear-gradient(135deg, ${T.accent2}22, ${T.yellow}33)`,
        borderRadius:16, padding:"16px", marginBottom:14,
        border:`1px solid ${T.border}`,
      }}>
        <div style={{fontSize:13,color:T.text3,marginBottom:2}}>
          {todayDate.toLocaleDateString("zh-TW",{year:"numeric",month:"long",day:"numeric",weekday:"long"})}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontSize:20,fontWeight:800,color:T.text}}>早安 ☀️</div>
            <div style={{fontSize:13,color:T.text3,marginTop:2}}>
              今天有 {todayTasks.length} 件任務、{todayCourses.length} 堂課
            </div>
          </div>
          {todayMood ? (
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:32}}>{MOODS[todayMood.mood]}</div>
              <div style={{fontSize:11,color:T.text3}}>{MOOD_LABELS[todayMood.mood]}</div>
            </div>
          ) : (
            <div style={{
              textAlign:"center",padding:"8px 12px",borderRadius:12,
              background:T.bg2,border:`1px dashed ${T.border2}`,
            }}>
              <div style={{fontSize:22}}>🌸</div>
              <div style={{fontSize:10,color:T.muted}}>記錄今日心情</div>
            </div>
          )}
        </div>
      </div>

      {/* Today's tasks */}
      <Card style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:13,fontWeight:700,color:T.text2}}>✅ 今日任務</span>
          {todayTasks.length > 0 && (
            <span style={{fontSize:12,color:T.muted}}>{doneTasks}/{todayTasks.length} 完成</span>
          )}
        </div>
        {todayTasks.length === 0
          ? <div style={{fontSize:12,color:T.muted,textAlign:"center",padding:"8px 0"}}>今天沒有任務</div>
          : <>
            {todayTasks.length > 1 && (
              <div style={{height:5,background:T.bg3,borderRadius:3,marginBottom:8,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${doneTasks/todayTasks.length*100}%`,
                  background:T.accent2,borderRadius:3,transition:"width 0.4s"}} />
              </div>
            )}
            {todayTasks.map(t => {
              const type = getType(t.typeId);
              return (
                <div key={t.id} style={{
                  display:"flex",alignItems:"center",gap:8,
                  padding:"6px 0",borderBottom:`1px solid ${T.border}`,
                }}>
                  <div style={{
                    width:16,height:16,borderRadius:4,flexShrink:0,
                    background:t.done?(type?type.color:T.accent2):"transparent",
                    border:`2px solid ${type?type.color:t.done?T.accent2:T.border2}`,
                    display:"flex",alignItems:"center",justifyContent:"center",
                  }}>
                    {t.done && <span style={{color:"#fff",fontSize:10}}>✓</span>}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <span style={{
                      fontSize:13,color:t.done?T.text3:T.text,
                      textDecoration:t.done?"line-through":"none",
                    }}>{t.name}</span>
                    {type && <span style={{
                      fontSize:10,marginLeft:6,padding:"1px 6px",borderRadius:8,
                      background:type.color+"33",color:type.color,fontWeight:600,
                    }}>{type.name}</span>}
                  </div>
                  {(t.startTime||t.time) && (
                    <span style={{fontSize:11,color:T.muted,flexShrink:0}}>
                      {t.startTime||t.time}
                    </span>
                  )}
                </div>
              );
            })}
          </>
        }
      </Card>

      {/* Today's courses */}
      {todayCourses.length > 0 && (
        <Card style={{marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,color:T.text2,marginBottom:10}}>🗓 今日課表</div>
          {todayCourses.map((c,i) => (
            <div key={c.id} style={{
              display:"flex",alignItems:"center",gap:8,
              padding:"6px 0",borderBottom:i<todayCourses.length-1?`1px solid ${T.border}`:"none",
            }}>
              <div style={{
                width:3,height:32,borderRadius:2,flexShrink:0,
                background:T.accent2,
              }} />
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600,color:T.text}}>{c.name}</div>
                {c.teacher && <div style={{fontSize:11,color:T.muted}}>{c.teacher}</div>}
              </div>
              {c.startTime && (
                <span style={{fontSize:11,color:T.accent3,fontWeight:600}}>
                  {c.startTime}{c.endTime?`~${c.endTime}`:""}
                </span>
              )}
            </div>
          ))}
        </Card>
      )}

      {/* Habits today */}
      {monthHabits.length > 0 && (
        <Card style={{marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,color:T.text2,marginBottom:10}}>🔥 今日打卡</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {monthHabits.map(h => {
              const done = checks[`${key}-${h}-${day}`];
              return (
                <div key={h} style={{
                  padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:600,
                  background:done?T.accent2+"33":T.bg2,
                  border:`1.5px solid ${done?T.accent2:T.border}`,
                  color:done?T.accent3:T.text3,
                }}>
                  {done?"✓ ":""}{h}
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {/* Upcoming exams/homework */}
      {upcoming.length > 0 && (
        <Card style={{marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,color:T.text2,marginBottom:10}}>📌 即將到期（7天內）</div>
          {upcoming.map(e => {
            const d = e.time || e.deadline;
            const dt = new Date(d);
            const diff = Math.ceil((dt - todayDate) / (1000*60*60*24));
            const urgent = diff <= 2;
            return (
              <div key={e.id} style={{
                display:"flex",alignItems:"center",gap:8,
                padding:"6px 0",borderBottom:`1px solid ${T.border}`,
              }}>
                <span style={{fontSize:14}}>{e.kind==="考試"?"📝":"📋"}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600,color:T.text}}>{e.name}</div>
                  {e.subject && <div style={{fontSize:11,color:T.muted}}>{e.subject}</div>}
                </div>
                <span style={{
                  fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10,flexShrink:0,
                  background:urgent?T.red+"33":T.yellow+"55",
                  color:urgent?T.red:T.text3,
                }}>
                  {diff===0?"今天":diff===1?"明天":`${diff}天後`}
                </span>
              </div>
            );
          })}
        </Card>
      )}
    </div>
  );
}

const DIARY_SUBS = [
  { id:"week", label:"週手帳", icon:"📅" },
  { id:"month", label:"月概覽", icon:"📊" },
  { id:"habit", label:"打卡牆", icon:"✅" },
  { id:"quick", label:"隨手記", icon:"📷" },
];
const PLAN_SUBS = [
  { id:"today", label:"今日任務", icon:"✅" },
  { id:"calendar", label:"月視圖", icon:"📅" },
  { id:"goals", label:"目標牆", icon:"🎯" },
  { id:"projects", label:"專案錄", icon:"📁" },
];
const LIFE_SUBS = [
  { id:"finance", label:"財務帳", icon:"💰" },
  { id:"period", label:"生理期", icon:"🌸" },
  { id:"bookmarks", label:"收藏夾", icon:"🔖" },
  { id:"memos", label:"備忘錄", icon:"📋" },
];
const CAMPUS_SUBS = [
  { id:"courses", label:"課程管理", icon:"📚" },
  { id:"schedule", label:"課表", icon:"🗓" },
  { id:"exams", label:"考試作業", icon:"📝" },
  { id:"activities", label:"活動經歷", icon:"🏆" },
];

function App() {
  const [tab, setTab] = useState("diary");
  const [sub, setSub] = useState("week");
  const [showOverview, setShowOverview] = useState(false);
  const [syncModal, setSyncModal] = useState(false);
  const [importResult, setImportResult] = useState(null);
  const [copyDone, setCopyDone] = useState(false);
  const [exportJson, setExportJson] = useState("");
  const [pasteText, setPasteText] = useState("");
  const [showPasteBox, setShowPasteBox] = useState(false);
  const [cloudStatus, setCloudStatus] = useState("loading"); // "loading"|"synced"|"offline"
  const importFileRef = useRef();

  // Load from Supabase on first open (only once per session)
  useEffect(() => {
    // Skip if we already synced this session
    if (sessionStorage.getItem("__synced")) {
      setCloudStatus("synced");
      return;
    }
    sbLoad().then(cloudData => {
      if (cloudData && Object.keys(cloudData).length > 0) {
        ALL_KEYS.forEach(k => {
          if (cloudData[k] !== undefined) {
            localStorage.setItem(k, JSON.stringify(cloudData[k]));
          }
        });
        sessionStorage.setItem("__synced", "1");
        window.location.reload();
      } else {
        // No cloud data yet — first time use, or offline
        sessionStorage.setItem("__synced", "1");
        setCloudStatus("synced");
        // Push current localStorage to cloud
        scheduleCloudSave();
      }
    }).catch(() => {
      setCloudStatus("offline");
    });
  }, []);

  // Diary
  const [diaryData, setDiaryData] = useStorage("diary-entries", []);
  const [habitData, setHabitData] = useStorage("habit-data", { habits:{}, checks:{} });
  const [quickData, setQuickData] = useStorage("quick-notes", []);

  // Plan
  const [tasks, setTasks] = useStorage("tasks", []);
  const [goals, setGoals] = useStorage("goals", []);
  const [projects, setProjects] = useStorage("projects", []);

  // Life
  const [finance, setFinance] = useStorage("finance", []);
  const [period, setPeriod] = useStorage("period", []);
  const [bookmarks, setBookmarks] = useStorage("bookmarks", []);
  const [memos, setMemos] = useStorage("memos", []);

  // Campus
  const [semester, setSemester] = useStorage("campus-semester", "大一上");
  const [semModal, setSemModal] = useState(false);
  const [courses, setCourses] = useStorage("campus-courses", []);
  const [gradReq, setGradReq] = useStorage("grad-req", { total:"", types:{} });
  const [examHw, setExamHw] = useStorage("exam-hw", []);
  const [activities, setActivities] = useStorage("activities", []);

  const subMap = { diary:DIARY_SUBS, plan:PLAN_SUBS, life:LIFE_SUBS, campus:CAMPUS_SUBS };
  const subs = subMap[tab];

  const switchTab = (id) => {
    setTab(id);
    setShowOverview(false);
    const map = { diary:"week", plan:"today", life:"finance", campus:"courses" };
    setSub(map[id]);
  };

  const renderContent = () => {
    if (tab==="diary") {
      if (sub==="week") return <WeekDiary data={diaryData} setData={setDiaryData} />;
      if (sub==="month") return <MonthOverview data={diaryData} />;
      if (sub==="habit") return <HabitWall data={habitData} setData={setHabitData} />;
      if (sub==="quick") return <QuickNotes data={quickData} setData={setQuickData} />;
    }
    if (tab==="plan") {
      if (sub==="today") return <TodayTasks data={tasks} setData={setTasks} />;
      if (sub==="calendar") return <MonthCalendar tasks={tasks} />;
      if (sub==="goals") return <GoalWall data={goals} setData={setGoals} />;
      if (sub==="projects") return <ProjectLog data={projects} setData={setProjects} />;
    }
    if (tab==="life") {
      if (sub==="finance") return <Finance data={finance} setData={setFinance} />;
      if (sub==="period") return <PeriodTracker data={period} setData={setPeriod} />;
      if (sub==="bookmarks") return <Bookmarks data={bookmarks} setData={setBookmarks} />;
      if (sub==="memos") return <Memos data={memos} setData={setMemos} />;
    }
    if (tab==="campus") {
      if (sub==="courses") return <CourseManagement courses={courses} setCourses={setCourses} gradReq={gradReq} setGradReq={setGradReq} semester={semester} />;
      if (sub==="schedule") return <CourseSchedule courses={courses} semester={semester} />;
      if (sub==="exams") return <ExamsHomework data={examHw} setData={setExamHw} />;
      if (sub==="activities") return <Activities data={activities} setData={setActivities} />;
    }
  };

  return (
    <div style={{
      minHeight:"100vh", background:T.bg,
      fontFamily:"'Noto Sans TC', 'Microsoft JhengHei', sans-serif",
      maxWidth:480, margin:"0 auto", position:"relative",
    }}>
      {/* Header */}
      <div style={{
        background:T.card, borderBottom:`1px solid ${T.border}`,
        padding:"14px 16px 10px", position:"sticky", top:0, zIndex:100,
        boxShadow:"0 2px 12px rgba(90,55,30,0.06)",
      }}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:22}}>🫖</span>
            <div>
              <div style={{fontSize:17,fontWeight:800,color:T.text,letterSpacing:1}}>My Planner</div>
              <div style={{fontSize:11,color:T.muted}}>{new Date().toLocaleDateString("zh-TW",{month:"long",day:"numeric",weekday:"short"})}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <button onClick={()=>setShowOverview(v=>!v)} style={{
              background: showOverview ? T.accent2 : T.bg2,
              border:`1px solid ${showOverview ? T.accent2 : T.border}`,
              borderRadius:10, padding:"6px 10px", cursor:"pointer", fontSize:12,
              color: showOverview ? "#fff" : T.text2,
              fontFamily:"inherit", fontWeight:600,
              display:"flex", alignItems:"center", gap:4,
            }}>🏠 今日</button>
            <button onClick={()=>{setImportResult(null);setCopyDone(false);setExportJson("");setPasteText("");setShowPasteBox(false);setSyncModal(true);}} style={{
              background:T.bg2,border:`1px solid ${T.border}`,borderRadius:10,
              padding:"6px 10px",cursor:"pointer",fontSize:12,color:T.text2,
              fontFamily:"inherit",fontWeight:600,display:"flex",alignItems:"center",gap:4,
            }}>
              <span style={{
                width:7,height:7,borderRadius:"50%",display:"inline-block",flexShrink:0,
                background: cloudStatus==="synced"?"#4CAF50": cloudStatus==="loading"?T.accent2: T.muted,
              }} />
              ☁️ 備份
            </button>
            {tab==="campus" && (
              <Btn small variant="secondary" onClick={()=>setSemModal(true)}>🎓 {semester}</Btn>
            )}
          </div>
        </div>

        {/* Main tabs */}
        <div style={{display:"flex",gap:0,background:T.bg3,borderRadius:12,padding:3}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>switchTab(t.id)} style={{
              flex:1,padding:"7px 4px",borderRadius:10,border:"none",cursor:"pointer",
              background:tab===t.id?T.card:"transparent",
              color:tab===t.id?T.accent3:T.text3,
              fontFamily:"inherit",fontWeight:tab===t.id?700:500,fontSize:12,
              transition:"all 0.15s",boxShadow:tab===t.id?"0 1px 4px rgba(90,55,30,0.12)":"none",
              display:"flex",flexDirection:"column",alignItems:"center",gap:1,
            }}>
              <span style={{fontSize:16}}>{t.icon}</span>
              <span>{t.label}</span>
            </button>
          ))}
        </div>
      </div>

      {/* Sub tabs — hidden when overview is open */}
      {!showOverview && (
      <div style={{
        background:T.bg, borderBottom:`1px solid ${T.border}`,
        padding:"8px 12px", display:"flex", gap:6, overflowX:"auto",
        position:"sticky", top:90, zIndex:99,
      }}>
        {subs.map(s=>(
          <button key={s.id} onClick={()=>setSub(s.id)} style={{
            padding:"6px 14px",borderRadius:20,border:`1.5px solid ${sub===s.id?T.accent2:T.border}`,
            background:sub===s.id?T.accent2+"22":T.card,
            color:sub===s.id?T.accent3:T.text3,
            fontFamily:"inherit",fontWeight:sub===s.id?700:500,fontSize:12,
            cursor:"pointer",whiteSpace:"nowrap",
            transition:"all 0.15s",
          }}>
            {s.icon} {s.label}
          </button>
        ))}
      </div>
      )}

      {/* Content */}
      <div style={{padding:"16px",paddingBottom:32}}>
        {showOverview
          ? <TodayOverview diaryData={diaryData} tasks={tasks} habitData={habitData} examHw={examHw} courses={courses} semester={semester} />
          : renderContent()
        }
      </div>

      {/* Semester Modal */}
      <Modal open={semModal} onClose={()=>setSemModal(false)} title="選擇學期">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {SEMESTERS.map(s=>(
            <button key={s} onClick={()=>{setSemester(s);setSemModal(false);}} style={{
              padding:"12px",borderRadius:12,border:`2px solid ${semester===s?T.accent2:T.border}`,
              background:semester===s?T.accent2+"22":T.card,
              color:semester===s?T.accent3:T.text,
              fontFamily:"inherit",fontWeight:semester===s?700:500,fontSize:14,cursor:"pointer",
            }}>{s}</button>
          ))}
        </div>
      </Modal>

      {/* Sync / Backup Modal */}
      <Modal open={syncModal} onClose={()=>{setSyncModal(false);setImportResult(null);setCopyDone(false);}} title="☁️ 資料備份與還原">
        <div style={{display:"flex",flexDirection:"column",gap:14}}>

          {/* Export — copy JSON to clipboard */}
          <div style={{background:T.bg2,borderRadius:12,padding:"14px"}}>
            <div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:4}}>📤 匯出備份</div>
            <p style={{margin:"0 0 10px",fontSize:13,color:T.text3,lineHeight:1.5}}>
              點「複製備份內容」，再貼到記事本（或任何文字軟體）另存成 <strong>.txt</strong> 或 <strong>.json</strong> 檔案儲存。
            </p>
            {copyDone ? (
              <div style={{background:"#A8C5A0"+"55",border:`1px solid #A8C5A0`,borderRadius:10,
                padding:"12px",textAlign:"center"}}>
                <div style={{fontSize:22,marginBottom:4}}>✅</div>
                <div style={{fontSize:14,fontWeight:700,color:"#3A6A3A"}}>已複製到剪貼簿！</div>
                <div style={{fontSize:12,color:"#3A6A3A",marginTop:4}}>
                  請打開記事本，貼上（Ctrl+V 或長按貼上），再儲存為 .txt 檔保管。
                </div>
              </div>
            ) : (
              <Btn onClick={()=>{
                const snapshot = {};
                ALL_KEYS.forEach(k => {
                  try {
                    const v = localStorage.getItem(k);
                    if (v !== null) snapshot[k] = JSON.parse(v);
                  } catch {}
                });
                snapshot.__exportedAt = new Date().toISOString();
                const json = JSON.stringify(snapshot, null, 2);
                navigator.clipboard.writeText(json)
                  .then(()=>setCopyDone(true))
                  .catch(()=>{
                    // Fallback: show text in a textarea for manual copy
                    setExportJson(json);
                  });
              }} style={{width:"100%"}}>📋 複製備份內容</Btn>
            )}
            {exportJson && !copyDone && (
              <div style={{marginTop:10}}>
                <div style={{fontSize:12,color:T.text3,marginBottom:4}}>
                  自動複製失敗，請手動全選以下內容後複製：
                </div>
                <textarea
                  readOnly
                  value={exportJson}
                  onFocus={e=>e.target.select()}
                  rows={5}
                  style={{width:"100%",fontSize:11,borderRadius:8,border:`1px solid ${T.border}`,
                    padding:"8px",background:T.card,color:T.text,fontFamily:"monospace",
                    resize:"none",boxSizing:"border-box"}}
                />
              </div>
            )}
          </div>

          {/* Import */}
          <div style={{background:T.bg2,borderRadius:12,padding:"14px"}}>
            <div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:4}}>📥 匯入還原</div>
            <p style={{margin:"0 0 10px",fontSize:13,color:T.text3,lineHeight:1.5}}>
              ⚠️ 匯入後目前資料會被覆蓋，請先確認已備份。
            </p>

            {importResult==="ok" && (
              <div style={{background:"#A8C5A0"+"44",border:`1px solid #A8C5A0`,borderRadius:8,
                padding:"8px 12px",marginBottom:10,fontSize:13,color:"#3A6A3A",fontWeight:600}}>
                ✅ 還原成功！請重新整理頁面以套用資料。
              </div>
            )}
            {importResult==="fail" && (
              <div style={{background:T.red+"33",border:`1px solid ${T.red}`,borderRadius:8,
                padding:"8px 12px",marginBottom:10,fontSize:13,color:T.red,fontWeight:600}}>
                ❌ 格式錯誤，請確認貼上的是完整備份內容。
              </div>
            )}

            {/* Option 1: paste text */}
            <div style={{marginBottom:10}}>
              <div style={{fontSize:13,fontWeight:600,color:T.text2,marginBottom:6}}>
                方式一：貼上備份文字
              </div>
              <div style={{fontSize:12,color:T.text3,marginBottom:8,lineHeight:1.5}}>
                從 Google 文件、備忘錄複製備份內容後貼到下方，再點「還原」。
              </div>
              {!showPasteBox ? (
                <Btn variant="secondary" style={{width:"100%"}} onClick={()=>setShowPasteBox(true)}>
                  📋 貼上備份文字
                </Btn>
              ) : (
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <textarea
                    value={pasteText}
                    onChange={e=>setPasteText(e.target.value)}
                    placeholder="長按此處貼上備份內容..."
                    rows={5}
                    style={{width:"100%",padding:"10px 12px",borderRadius:10,
                      border:`1.5px solid ${T.border}`,background:T.card,color:T.text,
                      fontSize:12,fontFamily:"monospace",resize:"none",
                      outline:"none",boxSizing:"border-box"}}
                  />
                  <div style={{display:"flex",gap:8}}>
                    <Btn style={{flex:1}} onClick={()=>{
                      try {
                        const parsed = JSON.parse(pasteText.trim());
                        Object.entries(parsed).forEach(([k,v])=>{
                          if (!k.startsWith("__")) localStorage.setItem(k, JSON.stringify(v));
                        });
                        setImportResult("ok");
                        setPasteText("");
                        setShowPasteBox(false);
                      } catch {
                        setImportResult("fail");
                      }
                    }}>還原</Btn>
                    <Btn variant="ghost" onClick={()=>{setShowPasteBox(false);setPasteText("");}}>取消</Btn>
                  </div>
                </div>
              )}
            </div>

            {/* Divider */}
            <div style={{display:"flex",alignItems:"center",gap:8,margin:"4px 0 10px"}}>
              <div style={{flex:1,height:1,background:T.border}} />
              <span style={{fontSize:12,color:T.muted}}>或</span>
              <div style={{flex:1,height:1,background:T.border}} />
            </div>

            {/* Option 2: file */}
            <div>
              <div style={{fontSize:13,fontWeight:600,color:T.text2,marginBottom:6}}>
                方式二：選擇備份檔案
              </div>
              <div style={{fontSize:12,color:T.text3,marginBottom:8}}>
                選擇之前匯出的 .json 或 .txt 備份檔案。
              </div>
              <Btn variant="secondary" style={{width:"100%"}} onClick={()=>importFileRef.current.click()}>
                📂 選擇備份檔案
              </Btn>
              <input
                ref={importFileRef} type="file" accept=".json,.txt" style={{display:"none"}}
                onChange={e=>{
                  const f = e.target.files[0];
                  if (!f) return;
                  importAllData(f, (ok)=>{ setImportResult(ok?"ok":"fail"); });
                  e.target.value="";
                }}
              />
            </div>
          </div>

          {/* Tips */}
          <div style={{fontSize:12,color:T.text2,lineHeight:1.8,
            background:T.yellow+"33",borderRadius:8,padding:"10px 12px",border:`1px solid ${T.yellow}`}}>
            💡 <strong>建議備份流程：</strong><br/>
            點「複製備份內容」→ 打開 Google 文件貼上儲存<br/>
            還原時：從 Google 文件複製 → 貼到「貼上備份文字」→ 點還原
          </div>
        </div>
      </Modal>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    document.getElementById('loading').style.display='none';
  </script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>{
        navigator.serviceWorker.register('/project/service-worker.js').catch(()=>{});
      });
    }
  </script>
</body>
</html>
