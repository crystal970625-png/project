// SUPABASE CONFIG
// ═══════════════════════════════════════════════════════
const SUPABASE_URL = "https://sznmfrplhlzxgtomhhrb.supabase.co";
const SUPABASE_KEY = "sb_publishable_YNF9lbK3oSFnOgzuPswCIQ_hFE9p_2B";
const TABLE = "project_data";
// A fixed user key — since there's no login, we use a device key stored in localStorage
const getUserKey = () => {
  let k = localStorage.getItem("__user_key");
  if (!k) {
    k = "user_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem("__user_key", k);
  }
  return k;
};

// Supabase REST helpers
const sbHeaders = {
  "apikey": SUPABASE_KEY,
  "Authorization": `Bearer ${SUPABASE_KEY}`,
  "Content-Type": "application/json",
  "Prefer": "return=minimal",
};

async function sbLoad() {
  try {
    const userKey = getUserKey();
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${TABLE}?user_key=eq.${encodeURIComponent(userKey)}&select=data`,
      { headers: sbHeaders }
    );
    if (!res.ok) return null;
    const rows = await res.json();
    return rows.length > 0 ? rows[0].data : null;
  } catch { return null; }
}

async function sbSave(snapshot) {
  try {
    const userKey = getUserKey();
    // Upsert: insert or update based on user_key
    await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
      method: "POST",
      headers: { ...sbHeaders, "Prefer": "resolution=merge-duplicates,return=minimal" },
      body: JSON.stringify({
        user_key: userKey,
        data: snapshot,
        updated_at: new Date().toISOString(),
      }),
    });
  } catch {}
}

// ═══════════════════════════════════════════════════════
// STORAGE HELPERS — localStorage cache + Supabase sync
// ═══════════════════════════════════════════════════════

// Global pending save timer
let _saveTimer = null;
let _pendingSnapshot = {};

function scheduleCloudSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    // Build full snapshot from localStorage
    const snapshot = {};
    ALL_KEYS.forEach(k => {
      try {
        const v = localStorage.getItem(k);
        if (v !== null) snapshot[k] = JSON.parse(v);
      } catch {}
    });
    sbSave(snapshot);
  }, 1500); // debounce: save 1.5s after last change
}

const useStorage = (key, defaultValue) => {
  const [state, setState] = useState(() => {
    try {
      const stored = localStorage.getItem(key);
      return stored ? JSON.parse(stored) : defaultValue;
    } catch { return defaultValue; }
  });
  const set = (val) => {
    const next = typeof val === "function" ? val(state) : val;
    setState(next);
    try {
      localStorage.setItem(key, JSON.stringify(next));
      scheduleCloudSave(); // sync to Supabase after every change
    } catch {}
  };
  return [state, set];
};

// All storage keys used in the app
const ALL_KEYS = [
  "diary-entries","habit-data","quick-notes",
  "tasks","goals","projects",
  "finance","period","bookmarks","memos",
  "campus-semester","campus-courses","grad-req","exam-hw","activities",
  "task-types","customCourseTypes","bookmarks-open-folder",
  "finance-budget",
];

function exportAllData() {
  const snapshot = {};
  ALL_KEYS.forEach(k => {
    try {
      const v = localStorage.getItem(k);
      if (v !== null) snapshot[k] = JSON.parse(v);
    } catch {}
  });
  snapshot.__exportedAt = new Date().toISOString();
  const json = JSON.stringify(snapshot, null, 2);
  const dataUri = "data:application/json;charset=utf-8," + encodeURIComponent(json);
  const a = document.createElement("a");
  a.href = dataUri;
  a.download = `my-planner-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function importAllData(file, onDone) {
  const r = new FileReader();
  r.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      ALL_KEYS.forEach(k => {
        if (data[k] !== undefined) localStorage.setItem(k, JSON.stringify(data[k]));
      });
      onDone(true);
    } catch { onDone(false); }
  };
  r.readAsText(file);
}

// 週手帳：心情記錄
function WeekDiary({ data, setData }) {
  const [modal, setModal] = useState(false);
  const [edit, setEdit] = useState(null);
  const [form, setForm] = useState({ date: fmt(new Date()), mood: 0, note: "" });
  const [weekOffset, setWeekOffset] = useState(0); // 0 = this week, -1 = last week, etc.

  // Compute week days based on offset
  const getWeekDays = (offset) => {
    const today = new Date();
    const dow = today.getDay();
    // Convert Sun=0 to Mon=0 (Mon=0, Tue=1, ..., Sun=6)
    const mondayOffset = (dow + 6) % 7;
    return Array.from({length:7}, (_,i) => {
      const d = new Date(today);
      d.setDate(today.getDate() - mondayOffset + i + offset * 7);
      return d;
    });
  };

  const weekDays = getWeekDays(weekOffset);
  const weekStart = weekDays[0];
  const weekEnd = weekDays[6];

  const weekLabel = (() => {
    if (weekOffset === 0) return "本週";
    if (weekOffset === -1) return "上週";
    if (weekOffset === 1) return "下週";
    const m = weekStart.getMonth()+1;
    const d = weekStart.getDate();
    const m2 = weekEnd.getMonth()+1;
    const d2 = weekEnd.getDate();
    return `${m}/${d} ~ ${m2}/${d2}`;
  })();

  const open = (existing=null, date=null) => {
    if (existing) {
      setEdit(existing.id);
      setForm({ date: existing.date, mood: existing.mood ?? null, note: existing.note });
    } else {
      setEdit(null);
      setForm({ date: date ? fmt(date) : fmt(new Date()), mood: null, note: "" });
    }
    setModal(true);
  };

  const save = () => {
    // Allow saving with no mood if there's a note, or just mood, or both
    if (form.mood === null && !form.note.trim()) return;
    if (edit) {
      setData(data.map(d => d.id===edit ? {...d,...form} : d));
    } else {
      setData([...data, { id:uuid(), ...form }]);
    }
    setModal(false);
  };

  const del = (id) => setData(data.filter(d=>d.id!==id));

  // Recent entries: show entries from the current displayed week
  const weekEntries = [...data]
    .filter(e => {
      const ed = new Date(e.date);
      return ed >= weekStart && ed <= weekEnd;
    })
    .sort((a,b) => b.date > a.date ? 1 : -1);

  return (
    <div>
      {/* Week navigation */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <Btn small variant="ghost" onClick={()=>setWeekOffset(o=>o-1)}>‹</Btn>
        <span style={{flex:1,textAlign:"center",fontWeight:700,color:T.text,fontSize:14}}>
          {weekLabel}
          <span style={{fontSize:11,color:T.muted,marginLeft:6,fontWeight:400}}>
            {weekStart.getMonth()+1}/{weekStart.getDate()} – {weekEnd.getMonth()+1}/{weekEnd.getDate()}
          </span>
        </span>
        <Btn small variant="ghost" onClick={()=>setWeekOffset(o=>o+1)}>›</Btn>
        {weekOffset !== 0 && (
          <Btn small variant="secondary" onClick={()=>setWeekOffset(0)}>回本週</Btn>
        )}
      </div>

      {/* Week grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:16}}>
        {weekDays.map((d,i) => {
          const ds = fmt(d);
          const entry = data.find(x=>x.date===ds);
          const isToday = d.getDate()===CD && d.getMonth()===CM && d.getFullYear()===CY;
          return (
            <div key={i} onClick={()=>entry ? open(entry) : open(null,d)}
              style={{
                textAlign:"center", cursor:"pointer", borderRadius:12, padding:"8px 2px",
                background: entry ? (entry.mood!==null&&entry.mood!==undefined ? MOOD_COLORS[entry.mood] : T.bg3) : T.bg2,
                border: isToday ? `2px solid ${T.accent2}` : `1px solid ${T.border}`,
                transition:"all 0.15s",
              }}>
              <div style={{fontSize:10,color:T.text3,fontWeight:600}}>{DAYS[i]}</div>
              <div style={{fontSize:11,color:T.text2,marginBottom:2}}>{d.getDate()}</div>
              <div style={{fontSize:18}}>{entry ? (entry.mood!==null&&entry.mood!==undefined ? MOODS[entry.mood] : "📝") : "·"}</div>
            </div>
          );
        })}
      </div>

      {/* Entries this week */}
      <SectionTitle right={<Btn small onClick={()=>open()}>+ 新增</Btn>}>📝 本週記錄</SectionTitle>
      {weekEntries.length===0
        ? <EmptyState icon="🌸" text={weekOffset===0?"點日期格或「+ 新增」記錄心情":"這週沒有心情記錄"} />
        : weekEntries.map(entry => (
          <Card key={entry.id} style={{background:(entry.mood!==null&&entry.mood!==undefined?MOOD_COLORS[entry.mood]:T.bg2)+"88"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{fontSize:22}}>{entry.mood!==null&&entry.mood!==undefined ? MOODS[entry.mood] : "📝"}</span>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:T.text}}>{entry.date.replace(/-/g,"/")}</div>
                    {entry.mood!==null&&entry.mood!==undefined &&
                      <Tag label={MOOD_LABELS[entry.mood]} color={MOOD_COLORS[entry.mood]} />}
                  </div>
                </div>
                {entry.note && <p style={{margin:0,fontSize:13,color:T.text2,lineHeight:1.5}}>{entry.note}</p>}
              </div>
              <div style={{display:"flex",gap:6}}>
                <Btn small variant="ghost" onClick={()=>open(entry)}>編輯</Btn>
                <Btn small variant="danger" onClick={()=>del(entry.id)}>刪</Btn>
              </div>
            </div>
          </Card>
        ))
      }

      <Modal open={modal} onClose={()=>setModal(false)} title={edit?"編輯心情":"新增心情"}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Input type="date" value={form.date} onChange={v=>setForm({...form,date:v})} />
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:13,color:T.text3}}>今天的心情（可不選）</span>
              {form.mood !== null && (
                <button onClick={()=>setForm({...form,mood:null})} style={{
                  background:"none",border:"none",cursor:"pointer",fontSize:12,
                  color:T.muted,fontFamily:"inherit",
                }}>✕ 不選心情</button>
              )}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
              {MOODS.map((m,i) => (
                <div key={i} onClick={()=>setForm({...form,mood:form.mood===i?null:i})}
                  style={{
                    textAlign:"center", cursor:"pointer", padding:"8px 4px", borderRadius:10,
                    background: form.mood===i ? MOOD_COLORS[i] : T.bg2,
                    border: form.mood===i ? `2px solid ${T.accent2}` : `1px solid ${T.border}`,
                    opacity: form.mood!==null && form.mood!==i ? 0.5 : 1,
                  }}>
                  <div style={{fontSize:22}}>{m}</div>
                  <div style={{fontSize:10,color:T.text3}}>{MOOD_LABELS[i]}</div>
                </div>
              ))}
            </div>
          </div>
          <Textarea value={form.note} onChange={v=>setForm({...form,note:v})} placeholder="今天發生了什麼...（可選）" />
          <Btn onClick={save}>儲存</Btn>
        </div>
      </Modal>
    </div>
  );
}

// 月概覽：月曆 + 心情統計長條圖
function MonthOverview({ data }) {
  const [year, setYear] = useState(CY);
  const [month, setMonth] = useState(CM);

  const monthData = data.filter(d => {
    if (!d.date) return false;
    const [y, m] = d.date.split("-").map(Number);
    return y === year && m === (month + 1);
  });

  // Build a map: dateStr -> mood index
  const moodMap = {};
  monthData.forEach(d => { moodMap[d.date] = d.mood; });

  const firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const cells = Array(firstDay).fill(null).concat(Array.from({length:daysInMonth},(_,i)=>i+1));

  const counts = Array(10).fill(0);
  monthData.forEach(d => counts[d.mood]++);
  const total = monthData.length || 1;

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <Btn small variant="ghost" onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}}>‹</Btn>
        <span style={{flex:1,textAlign:"center",fontWeight:700,color:T.text}}>{year}年 {MONTHS[month]}</span>
        <Btn small variant="ghost" onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}}>›</Btn>
      </div>

      {/* 月曆 */}
      <Card style={{marginBottom:12}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:10,color:T.text3,padding:"2px 0",fontWeight:600}}>{d}</div>)}
          {cells.map((day,i)=>{
            if (!day) return <div key={i} />;
            const ds = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            const moodIdx = moodMap[ds];
            const hasMood = moodIdx !== undefined;
            const isToday = day===CD && month===CM && year===CY;
            return (
              <div key={i} style={{
                position:"relative", textAlign:"center", borderRadius:8, padding:"5px 2px 3px",
                background: hasMood ? MOOD_COLORS[moodIdx]+"AA" : T.bg2,
                border: isToday ? `2px solid ${T.accent2}` : `1px solid ${T.border}`,
                minHeight:36,
              }}>
                <div style={{fontSize:11,color:T.text2,fontWeight:isToday?700:400,marginBottom:1}}>{day}</div>
                {hasMood && (
                  <div style={{
                    position:"absolute",top:2,right:3,fontSize:13,lineHeight:1,
                  }}>{MOODS[moodIdx]}</div>
                )}
              </div>
            );
          })}
        </div>
        <div style={{fontSize:12,color:T.text3,marginTop:6}}>共記錄 {monthData.length} 天</div>
      </Card>

      {/* 橫式長條統計圖 */}
      <Card>
        <div style={{fontSize:13,fontWeight:700,color:T.text2,marginBottom:10}}>📊 心情統計</div>
        {MOODS.map((m,i) => counts[i]>0 && (
          <div key={i} style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3,alignItems:"center"}}>
              <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:16}}>{m}</span>{MOOD_LABELS[i]}</span>
              <span style={{color:T.text3}}>{counts[i]}天 ({Math.round(counts[i]/total*100)}%)</span>
            </div>
            <div style={{height:14,background:T.bg3,borderRadius:7,overflow:"hidden"}}>
              <div style={{
                height:"100%", width:`${counts[i]/total*100}%`,
                background:MOOD_COLORS[i], borderRadius:7, transition:"width 0.5s",
                border:`1px solid ${T.border}`,
              }} />
            </div>
          </div>
        ))}
        {monthData.length===0 && <EmptyState icon="📊" text="這個月還沒有記錄" />}
      </Card>
    </div>
  );
}

// 打卡牆
function HabitWall({ data, setData }) {
  const [year, setYear] = useState(CY);
  const [month, setMonth] = useState(CM);
  const [habitModal, setHabitModal] = useState(false);
  const [newHabit, setNewHabit] = useState("");

  const key = `${year}-${String(month+1).padStart(2,"0")}`;
  const habits = data.habits || {};
  const checks = data.checks || {};

  const monthHabits = habits[key] || [];
  const daysInMonth = new Date(year, month+1, 0).getDate();

  const toggle = (habit, day) => {
    const ckey = `${key}-${habit}-${day}`;
    setData({ ...data, checks: { ...checks, [ckey]: !checks[ckey] } });
  };

  const addHabit = () => {
    if (!newHabit.trim()) return;
    setData({ ...data, habits: { ...habits, [key]: [...monthHabits, newHabit.trim()] } });
    setNewHabit("");
    setHabitModal(false);
  };

  const delHabit = (h) => {
    setData({ ...data, habits: { ...habits, [key]: monthHabits.filter(x=>x!==h) } });
  };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
        <Btn small variant="ghost" onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}}>‹</Btn>
        <span style={{flex:1,textAlign:"center",fontWeight:700,color:T.text}}>{year}年 {MONTHS[month]}</span>
        <Btn small variant="ghost" onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}}>›</Btn>
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
        <Btn small onClick={()=>setHabitModal(true)}>+ 新增習慣</Btn>
      </div>

      {monthHabits.length===0 ? <EmptyState icon="✅" text="新增這個月的打卡習慣吧！" /> : (
        <div style={{overflowX:"auto"}}>
          <table style={{borderCollapse:"collapse",width:"100%",minWidth:360}}>
            <thead>
              <tr>
                <th style={{textAlign:"left",padding:"6px 8px",fontSize:12,color:T.text3,width:80}}>習慣</th>
                {Array.from({length:daysInMonth},(_,i)=>(
                  <th key={i} style={{
                    padding:"4px 2px",fontSize:10,color:T.text3,textAlign:"center",
                    fontWeight: i+1===CD && month===CM && year===CY ? 700 : 400,
                    color: i+1===CD && month===CM && year===CY ? T.accent2 : T.text3,
                  }}>{i+1}</th>
                ))}
                <th style={{padding:"4px 6px",fontSize:11,color:T.text3}}>達成</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {monthHabits.map(h => {
                const done = Array.from({length:daysInMonth},(_,i)=>checks[`${key}-${h}-${i+1}`]).filter(Boolean).length;
                return (
                  <tr key={h} style={{borderTop:`1px solid ${T.border}`}}>
                    <td style={{padding:"6px 8px",fontSize:12,color:T.text,fontWeight:600}}>{h}</td>
                    {Array.from({length:daysInMonth},(_,i)=>(
                      <td key={i} onClick={()=>toggle(h,i+1)}
                        style={{padding:"4px 2px",textAlign:"center",cursor:"pointer"}}>
                        <div style={{
                          width:16,height:16,borderRadius:4,margin:"0 auto",
                          background: checks[`${key}-${h}-${i+1}`] ? T.accent2 : T.bg3,
                          border:`1px solid ${T.border}`,
                          display:"flex",alignItems:"center",justifyContent:"center",
                          fontSize:10,color:"#fff",
                        }}>
                          {checks[`${key}-${h}-${i+1}`] ? "✓" : ""}
                        </div>
                      </td>
                    ))}
                    <td style={{padding:"4px 6px",textAlign:"center",fontSize:12,color:T.accent3,fontWeight:700}}>
                      {done}/{daysInMonth}
                    </td>
                    <td>
                      <button onClick={()=>delHabit(h)} style={{
                        background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:14
                      }}>✕</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      <Modal open={habitModal} onClose={()=>setHabitModal(false)} title="新增習慣">
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Input value={newHabit} onChange={setNewHabit} placeholder="例如：早起、運動、讀書..." />
          <Btn onClick={addHabit}>新增</Btn>
        </div>
      </Modal>
    </div>
  );
}

// 隨手記
function QuickNotes({ data, setData }) {
  const [modal, setModal] = useState(false);
  const [edit, setEdit] = useState(null);
  const [form, setForm] = useState({ text: "", image: null });
  const [sizeWarn, setSizeWarn] = useState(false);
  const fileRef = useRef();

  const open = (item=null) => {
    if (item) { setEdit(item.id); setForm({ text: item.text, image: item.image||item.imageUrl||null }); }
    else { setEdit(null); setForm({ text: "", image: null }); }
    setSizeWarn(false);
    setModal(true);
  };

  const handleImg = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    // Warn if image > 800KB (to stay safe within 5MB localStorage limit)
    if (f.size > 800 * 1024) {
      setSizeWarn(true);
    } else {
      setSizeWarn(false);
    }
    const r = new FileReader();
    r.onload = ev => setForm(fm => ({...fm, image: ev.target.result}));
    r.readAsDataURL(f);
    e.target.value = "";
  };

  const save = () => {
    if (!form.text.trim() && !form.image) return;
    const entry = { id: edit||uuid(), text: form.text, image: form.image, ts: new Date().toISOString() };
    if (edit) setData(data.map(d => d.id===edit ? entry : d));
    else setData([entry, ...data]);
    setModal(false);
  };

  const imgSrc = (item) => item.image || item.imageUrl || null;

  return (
    <div>
      <SectionTitle right={<Btn small onClick={()=>open()}>+ 新增</Btn>}>📷 隨手記</SectionTitle>
      {data.length===0 && <EmptyState icon="📝" text="隨時記錄靈感與生活！" />}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {data.map(item => (
          <Card key={item.id} style={{margin:0}}>
            {imgSrc(item) && (
              <img src={imgSrc(item)}
                style={{width:"100%",borderRadius:8,marginBottom:8,maxHeight:120,objectFit:"cover"}}
                onError={e=>{e.target.style.display="none";}} />
            )}
            <p style={{margin:"0 0 6px",fontSize:13,color:T.text,lineHeight:1.5}}>{item.text}</p>
            <div style={{fontSize:11,color:T.muted}}>{new Date(item.ts).toLocaleDateString("zh-TW")}</div>
            <div style={{display:"flex",gap:4,marginTop:8}}>
              <Btn small variant="ghost" onClick={()=>open(item)}>編輯</Btn>
              <Btn small variant="danger" onClick={()=>setData(data.filter(d=>d.id!==item.id))}>刪</Btn>
            </div>
          </Card>
        ))}
      </div>

      <Modal open={modal} onClose={()=>setModal(false)} title={edit?"編輯隨手記":"新增隨手記"}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {/* Image preview */}
          {form.image && (
            <div style={{position:"relative"}}>
              <img src={form.image} style={{width:"100%",borderRadius:10,maxHeight:200,objectFit:"cover"}} />
              <button onClick={()=>{setForm(f=>({...f,image:null}));setSizeWarn(false);}} style={{
                position:"absolute",top:6,right:6,background:"rgba(0,0,0,0.5)",
                border:"none",borderRadius:"50%",width:26,height:26,cursor:"pointer",
                color:"#fff",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",
              }}>✕</button>
            </div>
          )}

          {/* Size warning */}
          {sizeWarn && (
            <div style={{background:T.yellow+"55",border:`1px solid ${T.yellow}`,borderRadius:8,
              padding:"8px 12px",fontSize:12,color:T.text2,lineHeight:1.5}}>
              ⚠️ 圖片較大，建議定期刪除舊的隨手記，避免儲存空間不足。
            </div>
          )}

          {/* Upload buttons */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <Btn variant="secondary" onClick={()=>{
              fileRef.current.setAttribute("capture","environment");
              fileRef.current.click();
            }}>📷 拍照</Btn>
            <Btn variant="secondary" onClick={()=>{
              fileRef.current.removeAttribute("capture");
              fileRef.current.click();
            }}>🖼 選圖片</Btn>
          </div>
          <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleImg} />

          <Textarea value={form.text} onChange={v=>setForm(f=>({...f,text:v}))} placeholder="記錄一下..." rows={4} />
          <Btn onClick={save}>儲存</Btn>
        </div>
      </Modal>
    </div>
  );
}

function TodayTasks({ data, setData }) {
  const [modal, setModal] = useState(false);
  const [edit, setEdit] = useState(null);
  const [form, setForm] = useState({ name:"", date:fmt(new Date()), startTime:"", endTime:"", done:false, typeId:"" });

  // Task types stored persistently
  const [taskTypes, setTaskTypes] = useStorage("task-types", []);
  const [typeModal, setTypeModal] = useState(false);
  const [typeForm, setTypeForm] = useState({ name:"", color: "#C8966E" });
  const [editTypeId, setEditTypeId] = useState(null);

  const TYPE_PALETTE = [
    "#C8966E","#E8B4B8","#A8C5A0","#A8B8C8","#E8D4A0",
    "#D4847C","#C4A882","#B8A8D4","#A8C8C0","#D4C8A0",
  ];

  const openTask = (item=null) => {
    if (item) { setEdit(item.id); setForm({name:item.name,date:item.date,startTime:item.startTime||item.time||"",endTime:item.endTime||"",done:item.done,typeId:item.typeId||""}); }
    else { setEdit(null); setForm({name:"",date:fmt(new Date()),startTime:"",endTime:"",done:false,typeId:""}); }
    setModal(true);
  };

  const saveTask = () => {
    if (!form.name.trim()) return;
    if (edit) setData(data.map(d=>d.id===edit?{...d,...form}:d));
    else setData([...data, {id:uuid(),...form}]);
    setModal(false);
  };

  const openType = (type=null) => {
    if (type) { setEditTypeId(type.id); setTypeForm({name:type.name,color:type.color}); }
    else { setEditTypeId(null); setTypeForm({name:"",color:TYPE_PALETTE[taskTypes.length % TYPE_PALETTE.length]}); }
    setTypeModal(true);
  };

  const saveType = () => {
    if (!typeForm.name.trim()) return;
    if (editTypeId) setTaskTypes(taskTypes.map(t=>t.id===editTypeId?{...t,...typeForm}:t));
    else setTaskTypes([...taskTypes, {id:uuid(),...typeForm}]);
    setTypeModal(false);
  };

  const delType = (id) => {
    setTaskTypes(taskTypes.filter(t=>t.id!==id));
    setData(data.map(d=>d.typeId===id?{...d,typeId:""}:d));
  };

  const getType = (typeId) => taskTypes.find(t=>t.id===typeId);

  const timeDisplay = (t) => {
    if (!t.startTime) return null;
    return t.endTime ? `${t.startTime} ~ ${t.endTime}` : t.startTime;
  };

  const todayStr = fmt(new Date());
  const todayTasks = data.filter(t=>t.date===todayStr).sort((a,b)=>(a.startTime||a.time||"")>(b.startTime||b.time||"")?1:-1);
  const upcoming = data.filter(t=>t.date>todayStr).sort((a,b)=>a.date>b.date?1:(a.startTime||"")>(b.startTime||"")?1:-1).slice(0,5);

  return (
    <div>
      {/* Header + type manage */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <h3 style={{margin:0,fontSize:15,fontWeight:700,color:T.text2}}>✅ 今日任務</h3>
        <div style={{display:"flex",gap:6}}>
          <Btn small variant="ghost" onClick={()=>openType()}>⚙️ 管理類型</Btn>
          <Btn small onClick={()=>openTask()}>+ 新增</Btn>
        </div>
      </div>

      {/* Type filter chips */}
      {taskTypes.length>0 && (
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6,marginBottom:10}}>
          {taskTypes.map(type=>(
            <div key={type.id} style={{
              display:"flex",alignItems:"center",gap:5,padding:"4px 12px",borderRadius:20,flexShrink:0,
              background:type.color+"33",border:`1.5px solid ${type.color}`,
            }}>
              <div style={{width:8,height:8,borderRadius:"50%",background:type.color}} />
              <span style={{fontSize:12,fontWeight:600,color:T.text2}}>{type.name}</span>
            </div>
          ))}
        </div>
      )}

      {todayTasks.length===0 ? <EmptyState icon="🌟" text="今天沒有任務，去計劃一下吧！" /> : todayTasks.map(t=>{
        const type = getType(t.typeId);
        return (
          <Card key={t.id} style={{
            background:t.done?T.bg2:T.card,
            borderLeft: type ? `4px solid ${type.color}` : `4px solid ${T.border}`,
          }}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div onClick={()=>setData(data.map(d=>d.id===t.id?{...d,done:!d.done}:d))}
                style={{
                  width:22,height:22,borderRadius:6,
                  border:`2px solid ${type?type.color:t.done?T.accent2:T.border2}`,
                  background:t.done?(type?type.color:T.accent2):"transparent",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  cursor:"pointer",flexShrink:0,
                }}>
                {t.done && <span style={{color:"#fff",fontSize:13}}>✓</span>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:600,color:t.done?T.text3:T.text,textDecoration:t.done?"line-through":"none"}}>{t.name}</div>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginTop:2}}>
                  {type && (
                    <span style={{
                      fontSize:11,fontWeight:600,padding:"1px 8px",borderRadius:10,
                      background:type.color+"33",color:type.color,
                    }}>{type.name}</span>
                  )}
                  {timeDisplay(t) && <span style={{fontSize:12,color:T.muted}}>⏰ {timeDisplay(t)}</span>}
                </div>
              </div>
              <div style={{display:"flex",gap:4,flexShrink:0}}>
                <Btn small variant="ghost" onClick={()=>openTask(t)}>編輯</Btn>
                <Btn small variant="danger" onClick={()=>setData(data.filter(d=>d.id!==t.id))}>刪</Btn>
              </div>
            </div>
          </Card>
        );
      })}

      {upcoming.length>0 && <>
        <SectionTitle>📌 即將到來</SectionTitle>
        {upcoming.map(t=>{
          const type = getType(t.typeId);
          return (
            <Card key={t.id} style={{borderLeft: type?`4px solid ${type.color}`:`4px solid ${T.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:14,fontWeight:600,color:T.text}}>{t.name}</div>
                  <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginTop:2}}>
                    {type && <span style={{fontSize:11,fontWeight:600,padding:"1px 8px",borderRadius:10,background:type.color+"33",color:type.color}}>{type.name}</span>}
                    <span style={{fontSize:12,color:T.muted}}>{t.date.replace(/-/g,"/")}{timeDisplay(t)?` ⏰ ${timeDisplay(t)}`:""}</span>
                  </div>
                </div>
                <div style={{display:"flex",gap:4}}>
                  <Btn small variant="ghost" onClick={()=>openTask(t)}>編輯</Btn>
                  <Btn small variant="danger" onClick={()=>setData(data.filter(d=>d.id!==t.id))}>刪</Btn>
                </div>
              </div>
            </Card>
          );
        })}
      </>}

      {/* Task modal */}
      <Modal open={modal} onClose={()=>setModal(false)} title={edit?"編輯任務":"新增任務"}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Input value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="任務名稱" />
          <div>
            <div style={{fontSize:12,color:T.text3,marginBottom:4}}>任務類型（選填）</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              <div onClick={()=>setForm(f=>({...f,typeId:""}))}
                style={{
                  padding:"5px 14px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:600,
                  background:form.typeId===""?T.accent2+"33":T.bg2,
                  border:`1.5px solid ${form.typeId===""?T.accent2:T.border}`,
                  color:form.typeId===""?T.accent3:T.text3,
                }}>無</div>
              {taskTypes.map(type=>(
                <div key={type.id} onClick={()=>setForm(f=>({...f,typeId:type.id}))}
                  style={{
                    display:"flex",alignItems:"center",gap:5,padding:"5px 14px",borderRadius:20,cursor:"pointer",
                    background:form.typeId===type.id?type.color+"44":type.color+"18",
                    border:`1.5px solid ${form.typeId===type.id?type.color:type.color+"66"}`,
                    fontSize:12,fontWeight:600,color:T.text,
                  }}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:type.color}} />
                  {type.name}
                </div>
              ))}
              {taskTypes.length===0 && (
                <span style={{fontSize:12,color:T.muted}}>尚未新增任何類型，可點「管理類型」新增</span>
              )}
            </div>
          </div>
          <div><div style={{fontSize:12,color:T.text3,marginBottom:4}}>日期</div>
            <Input type="date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))} /></div>
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}>
              <div style={{fontSize:12,color:T.text3,marginBottom:4}}>開始時間</div>
              <Input type="time" value={form.startTime} onChange={v=>setForm(f=>({...f,startTime:v}))} />
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:12,color:T.text3,marginBottom:4}}>結束時間</div>
              <Input type="time" value={form.endTime} onChange={v=>setForm(f=>({...f,endTime:v}))} />
            </div>
          </div>
          <Btn onClick={saveTask}>儲存</Btn>
        </div>
      </Modal>

      {/* Type management modal */}
      <Modal open={typeModal} onClose={()=>setTypeModal(false)} title="管理任務類型">
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {/* Existing types */}
          {taskTypes.length>0 && (

function MonthCalendar({ tasks }) {
  const [year, setYear] = useState(CY);
  const [month, setMonth] = useState(CM);
  const [sel, setSel] = useState(fmt(new Date()));

  const firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const cells = Array(firstDay).fill(null).concat(Array.from({length:daysInMonth},(_,i)=>i+1));

  const makeDs = (d) => `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

  // Tasks for selected day, sorted by startTime
  const selTasks = tasks
    .filter(t => t.date === sel)
    .sort((a,b) => {
      const ta = a.startTime || a.time || "";
      const tb = b.startTime || b.time || "";
      return ta > tb ? 1 : -1;
    });

  const hasTimeInfo = selTasks.some(t => t.startTime || t.time);
  const noTimeTasks = selTasks.filter(t => !t.startTime && !t.time);

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <Btn small variant="ghost" onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}}>‹</Btn>
        <span style={{flex:1,textAlign:"center",fontWeight:700,color:T.text}}>{year}年 {MONTHS[month]}</span>
        <Btn small variant="ghost" onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}}>›</Btn>
      </div>

      {/* Calendar grid */}
      <Card style={{marginBottom:12}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:11,color:T.text3,padding:"4px 0",fontWeight:600}}>{d}</div>)}
          {cells.map((day,i)=>{
            if (!day) return <div key={i} />;
            const ds = makeDs(day);
            const dayTasks = tasks.filter(t=>t.date===ds);
            const hasTasks = dayTasks.length > 0;
            const taskCount = dayTasks.length;
            const isToday = day===CD && month===CM && year===CY;
            const isSel = ds===sel;
            return (
              <div key={i} onClick={()=>setSel(ds)} style={{
                textAlign:"center", cursor:"pointer", borderRadius:8, padding:"5px 2px 4px",
                background: isSel ? T.accent2 : isToday ? T.bg3 : "transparent",
                color: isSel ? "#fff" : T.text,
                border: isToday && !isSel ? `1.5px solid ${T.accent2}` : "1.5px solid transparent",
                minHeight: 38,
              }}>
                <div style={{fontSize:13,fontWeight:isToday?700:400,marginBottom:2}}>{day}</div>
                {hasTasks && (
                  <div style={{
                    fontSize:9,fontWeight:700,lineHeight:1,
                    background: isSel ? "rgba(255,255,255,0.3)" : T.accent2+"33",
                    color: isSel ? "#fff" : T.accent3,
                    borderRadius:4, padding:"1px 3px", display:"inline-block",
                  }}>{taskCount}</div>
                )}
              </div>
            );
          })}
        </div>
      </Card>

      {/* Selected day header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <span style={{fontSize:14,fontWeight:700,color:T.text2}}>
          {sel.replace(/-/g,"/")} {selTasks.length > 0 ? `· ${selTasks.length} 件事` : ""}
        </span>
      </div>

      {selTasks.length === 0 ? (
        <EmptyState icon="📅" text="這天沒有任務" />
      ) : (
        <>
          {/* Simplified timeline — only tasks with time, sorted */}
          {hasTimeInfo && (
            <Card style={{marginBottom:10,paddingBottom:8}}>
              <div style={{fontSize:12,fontWeight:700,color:T.text3,marginBottom:12}}>🕐 時間軸</div>
              <div style={{position:"relative"}}>
                {/* Vertical line */}
                <div style={{
                  position:"absolute", left:38, top:6, bottom:6,
                  width:2, background:T.border, borderRadius:1,
                }} />
                {selTasks.filter(t=>t.startTime||t.time).map((t, i) => {
                  const timeStr = t.startTime || t.time;
                  return (
                    <div key={t.id} style={{
                      display:"flex", alignItems:"flex-start", gap:0,
                      marginBottom: i < selTasks.filter(x=>x.startTime||x.time).length-1 ? 14 : 0,
                      position:"relative",
                    }}>
                      {/* Time label */}
                      <div style={{
                        width:34, flexShrink:0, fontSize:11, color:T.accent3,
                        fontWeight:700, textAlign:"right", paddingRight:8, paddingTop:4,
                        lineHeight:1.2, fontVariantNumeric:"tabular-nums",
                      }}>
                        {timeStr}
                      </div>
                      {/* Dot on the line */}
                      <div style={{
                        width:12, height:12, borderRadius:"50%", flexShrink:0,
                        marginTop:4, marginRight:10,
                        background: t.done ? T.bg3 : T.accent2,
                        border: `2px solid ${t.done ? T.border2 : T.accent3}`,
                        position:"relative", zIndex:1,
                      }} />
                      {/* Task card */}
                      <div style={{
                        flex:1,
                        background: t.done ? T.bg2 : T.accent2+"18",
                        border: `1.5px solid ${t.done ? T.border : T.accent2+"66"}`,
                        borderRadius:10, padding:"7px 12px",
                      }}>
                        <div style={{
                          fontSize:13, fontWeight:600,
                          color: t.done ? T.text3 : T.text,
                          textDecoration: t.done ? "line-through" : "none",
                          marginBottom: t.endTime ? 2 : 0,
                        }}>
                          {t.done ? "✓ " : ""}{t.name}
                        </div>
                        {t.endTime && (
                          <div style={{fontSize:11, color:T.muted}}>
                            {timeStr} ~ {t.endTime}
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </Card>
          )}

          {/* Tasks without time */}
          {noTimeTasks.length > 0 && (
            <>
              <div style={{fontSize:12,color:T.text3,marginBottom:6,fontWeight:600}}>📌 未指定時間</div>
              {noTimeTasks.map(t=>(
                <Card key={t.id} style={{borderLeft:`3px solid ${T.border2}`,marginBottom:6}}>
                  <div style={{fontSize:14,fontWeight:600,color:t.done?T.text3:T.text,textDecoration:t.done?"line-through":"none"}}>
                    {t.done?"✓ ":""}{t.name}
                  </div>
                </Card>
              ))}
            </>
          )}
        </>
      )}
    </div>
  );
}

function GoalWall({ data, setData }) {
  const [modal, setModal] = useState(false);
  const [nodeModal, setNodeModal] = useState(null);
  const [edit, setEdit] = useState(null);
  const [form, setForm] = useState({ name:"", deadline:"", color:T.yellow });
  const [nodeForm, setNodeForm] = useState({ text:"", done:false });

  const COLORS = [T.yellow, T.pink, T.green, T.blue, "#E8C8A8", "#D4C8E8"];

  const open = (item=null) => {
    if (item) { setEdit(item.id); setForm({name:item.name,deadline:item.deadline||"",color:item.color||T.yellow}); }
    else { setEdit(null); setForm({name:"",deadline:"",color:T.yellow}); }
    setModal(true);
  };

  const save = () => {
    if (!form.name.trim()) return;
    if (edit) setData(data.map(d=>d.id===edit?{...d,...form}:d));
    else setData([...data,{id:uuid(),...form,nodes:[]}]);
    setModal(false);
  };

  const addNode = () => {
    if (!nodeForm.text.trim()) return;
    setData(data.map(g=>g.id===nodeModal?{...g,nodes:[...(g.nodes||[]),{id:uuid(),text:nodeForm.text,done:false}]}:g));
    setNodeForm({text:"",done:false});
  };

  const toggleNode = (gid,nid) => setData(data.map(g=>g.id===gid?{...g,nodes:(g.nodes||[]).map(n=>n.id===nid?{...n,done:!n.done}:n)}:g));
  const delNode = (gid,nid) => setData(data.map(g=>g.id===gid?{...g,nodes:(g.nodes||[]).filter(n=>n.id!==nid)}:g));

  return (
    <div>
      <SectionTitle right={<Btn small onClick={()=>open()}>+ 新增目標</Btn>}>🎯 目標牆</SectionTitle>
      {data.length===0 && <EmptyState icon="🌟" text="設定你的目標，一步一步達成！" />}
      {data.map(g => {
        const nodes = g.nodes||[];
        const done = nodes.filter(n=>n.done).length;
        const prog = nodes.length ? done/nodes.length : 0;
        return (
          <Card key={g.id} style={{borderTop:`4px solid ${g.color||T.yellow}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <div style={{fontSize:15,fontWeight:700,color:T.text}}>{g.name}</div>
                {g.deadline && <div style={{fontSize:12,color:T.muted}}>截止：{g.deadline}</div>}
              </div>
              <div style={{display:"flex",gap:4}}>
                <Btn small variant="ghost" onClick={()=>open(g)}>編輯</Btn>
                <Btn small variant="danger" onClick={()=>setData(data.filter(d=>d.id!==g.id))}>刪</Btn>
              </div>
            </div>
            {nodes.length>0 && (
              <div style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:T.text3,marginBottom:4}}>
                  <span>進度</span><span>{done}/{nodes.length}</span>
                </div>
                <div style={{height:8,background:T.bg3,borderRadius:4,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${prog*100}%`,background:g.color||T.yellow,borderRadius:4,transition:"width 0.4s"}} />
                </div>
              </div>
            )}
            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
              {nodes.map(n=>(
                <div key={n.id} onClick={()=>toggleNode(g.id,n.id)}
                  style={{
                    display:"flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:20,cursor:"pointer",
                    background:n.done?(g.color||T.yellow):T.bg2,border:`1px solid ${T.border}`,
                    fontSize:12,color:T.text,
                  }}>
                  <span>{n.done?"✓":""}</span>{n.text}
                  <span onClick={e=>{e.stopPropagation();delNode(g.id,n.id)}} style={{color:T.muted,marginLeft:2}}>✕</span>
                </div>
              ))}
            </div>
            <Btn small variant="secondary" onClick={()=>setNodeModal(g.id)}>+ 新增節點</Btn>
          </Card>
        );
      })}

      <Modal open={modal} onClose={()=>setModal(false)} title={edit?"編輯目標":"新增目標"}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Input value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="目標名稱" />
          <Input type="date" value={form.deadline} onChange={v=>setForm(f=>({...f,deadline:v}))} />
          <ColorPicker value={form.color||T.yellow} onChange={c=>setForm(f=>({...f,color:c}))} label="主題顏色" />
          <Btn onClick={save}>儲存</Btn>
        </div>
      </Modal>

      <Modal open={!!nodeModal} onClose={()=>setNodeModal(null)} title="新增節點">
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Input value={nodeForm.text} onChange={v=>setNodeForm(f=>({...f,text:v}))} placeholder="節點名稱" />
          <Btn onClick={addNode}>新增</Btn>
        </div>
      </Modal>
    </div>
  );
}

function ProjectLog({ data, setData }) {
  const [modal, setModal] = useState(false);
  const [edit, setEdit] = useState(null);
  const [form, setForm] = useState({ name:"", desc:"", files:[], links:[] });
  const [sel, setSel] = useState(null);
  const [newLink, setNewLink] = useState("");
  const fileRef = useRef();

  const open = (item=null) => {
    if (item) { setEdit(item.id); setForm({name:item.name,desc:item.desc||"",files:item.files||[],links:item.links||[]}); }
    else { setEdit(null); setForm({name:"",desc:"",files:[],links:[]}); }
    setModal(true);
  };

  const save = () => {
    if (!form.name.trim()) return;
    if (edit) setData(data.map(d=>d.id===edit?{...d,name:form.name,desc:form.desc,files:form.files,links:form.links}:d));
    else setData([...data,{id:uuid(),name:form.name,desc:form.desc,files:[],links:form.links,ts:new Date().toISOString()}]);
    setModal(false);
  };

  const addLinkToForm = () => {
    if (!newLink.trim()) return;
    setForm(f=>({...f, links:[...f.links, {id:uuid(), url:newLink.trim()}]}));
    setNewLink("");
  };

  const addLinkToProject = (pid) => {
    if (!newLink.trim()) return;
    setData(data.map(d=>d.id===pid?{...d,links:[...(d.links||[]),{id:uuid(),url:newLink.trim()}]}:d));
    setNewLink("");
  };

  const delLink = (pid, lid) => {
    setData(data.map(d=>d.id===pid?{...d,links:(d.links||[]).filter(l=>l.id!==lid)}:d));
  };

  const fmtLink = (url) => {
    try { return new URL(url.startsWith("http")?url:"https://"+url).hostname; }
    catch { return url.length>30?url.slice(0,30)+"…":url; }
  };

  const proj = sel ? data.find(d=>d.id===sel) : null;

  return (
    <div>
      {sel ? (
        <>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <Btn small variant="ghost" onClick={()=>setSel(null)}>← 返回</Btn>
            <span style={{fontSize:15,fontWeight:700,color:T.text,flex:1}}>{proj.name}</span>
            <Btn small onClick={()=>open(proj)}>編輯</Btn>
          </div>
          <Card>
            <div style={{fontSize:13,color:T.text3,marginBottom:4}}>建立時間：{new Date(proj.ts).toLocaleDateString("zh-TW")}</div>
            {proj.desc && <p style={{margin:"0 0 10px",fontSize:13,color:T.text2,lineHeight:1.6}}>{proj.desc}</p>}

            {/* Links section */}
            <SectionTitle>🔗 連結</SectionTitle>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <input
                value={newLink}
                onChange={e=>setNewLink(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&addLinkToProject(proj.id)}
                placeholder="貼上連結..."
                style={{
                  flex:1,padding:"8px 12px",borderRadius:10,border:`1.5px solid ${T.border}`,
                  background:T.card,color:T.text,fontSize:13,fontFamily:"inherit",outline:"none",
                }}
              />
              <Btn small onClick={()=>addLinkToProject(proj.id)}>新增</Btn>
            </div>
            {(proj.links||[]).length===0
              ? <div style={{fontSize:12,color:T.muted,marginBottom:8}}>還沒有連結</div>
              : (proj.links||[]).map(l=>(
                <div key={l.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",
                  background:T.bg2,borderRadius:8,marginBottom:4}}>
                  <span style={{fontSize:14}}>🔗</span>
                  <a href={l.url.startsWith("http")?l.url:"https://"+l.url}
                    target="_blank" rel="noopener noreferrer"
                    style={{flex:1,fontSize:13,color:T.blue,textDecoration:"none",wordBreak:"break-all"}}>
                    {fmtLink(l.url)}
                  </a>
                  <Btn small variant="danger" onClick={()=>delLink(proj.id,l.id)}>刪</Btn>
                </div>
              ))
            }

            {/* Files section */}
            <SectionTitle right={
              <Btn small variant="secondary" onClick={()=>fileRef.current.click()}>+ 上傳</Btn>
            }>📎 檔案</SectionTitle>
            {(proj.files||[]).length===0 ? <EmptyState icon="📂" text="還沒有檔案" /> :
              (proj.files||[]).map((f,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  padding:"8px 10px",background:T.bg2,borderRadius:8,marginBottom:4}}>
                  <span style={{fontSize:13,color:T.text}}>📄 {f.name}</span>
                  <Btn small variant="danger" onClick={()=>setData(data.map(d=>d.id===proj.id?{...d,files:(d.files||[]).filter((_,j)=>j!==i)}:d))}>刪</Btn>
                </div>
              ))

          </Card>
          <input ref={fileRef} type="file" multiple style={{display:"none"}} onChange={e=>{

            });
          }} />

        <>
          <SectionTitle right={<Btn small onClick={()=>open()}>+ 新增</Btn>}>📁 專案錄</SectionTitle>

          {data.map(p=>(
            <Card key={p.id} style={{cursor:"pointer"}} onClick={()=>setSel(p.id)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,fontWeight:700,color:T.text}}>{p.name}</div>

                  <Btn small variant="danger" onClick={()=>setData(data.filter(d=>d.id!==p.id))}>刪</Btn>
                </div>
              </div>
            </Card>
          ))}
        </>
      )}
      <Modal open={modal} onClose={()=>setModal(false)} title={edit?"編輯專案":"新增專案"}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Input value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="專案名稱" />
          <Textarea value={form.desc} onChange={v=>setForm(f=>({...f,desc:v}))} placeholder="專案說明（選填）" rows={3} />
          <div>
            <div style={{fontSize:12,color:T.text3,marginBottom:6,fontWeight:600}}>🔗 檔案連結（選填）</div>
            <div style={{display:"flex",gap:8,marginBottom:6}}>
              <input
                value={newLink}
                onChange={e=>setNewLink(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&addLinkToForm()}
                placeholder="貼上連結後按 Enter..."
                style={{
                  flex:1,padding:"8px 12px",borderRadius:10,border:`1.5px solid ${T.border}`,
                  background:T.bg,color:T.text,fontSize:13,fontFamily:"inherit",outline:"none",
                }}
              />
              <Btn small onClick={addLinkToForm}>新增</Btn>
            </div>
            {form.links.map(l=>(
              <div key={l.id} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",
                background:T.bg2,borderRadius:8,marginBottom:4}}>
                <span style={{fontSize:13,color:T.blue,flex:1,wordBreak:"break-all"}}>{fmtLink(l.url)}</span>
                <button onClick={()=>setForm(f=>({...f,links:f.links.filter(x=>x.id!==l.id)}))}
                  style={{background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:14}}>✕</button>
              </div>
            ))}
          </div>
          <Btn onClick={save}>儲存</Btn>
        </div>
      </Modal>
    </div>
  );
}
