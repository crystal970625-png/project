  const monthData = data.filter(d=>{
    if (!d.date) return false;
    const [y,m] = d.date.split("-").map(Number);
    return y===year && m===(month+1);
  });
  const total = monthData.reduce((s,d)=>s+Number(d.amount||0),0);
  const budgetNum = Number(budget)||0;
  const budgetUsed = budgetNum ? Math.min(total/budgetNum*100,100) : 0;
  const overBudget = budgetNum && total > budgetNum;

  const typeTotals = expenseTypes.map(t=>({
    type:t, amount: monthData.filter(d=>d.type===t).reduce((s,d)=>s+Number(d.amount||0),0)
  }));

  // Build last 12 months trend data
  const trendMonths = Array.from({length:12},(_,i)=>{
    const d = new Date(CY, CM - 11 + i, 1);
    const y = d.getFullYear(), m = d.getMonth();
    const label = `${m+1}月`;
    const amt = data
      .filter(x=>{ if(!x.date) return false; const [dy,dm]=x.date.split("-").map(Number); return dy===y&&dm===(m+1); })
      .reduce((s,x)=>s+Number(x.amount||0),0);
    return { y, m, label, amt };
  });
  const maxTrend = Math.max(...trendMonths.map(t=>t.amt), 1);

  const open = (item=null) => {
    if (item) { setEdit(item.id); setForm({item:item.item,date:item.date,type:item.type,amount:item.amount}); }
    else { setEdit(null); setForm({item:"",date:new Date().toISOString().slice(0,10),type:"三餐",amount:""}); }
    setModal(true);
  };

  const save = () => {
    if (!form.item.trim() || !form.amount) return;
    if (edit) setData(data.map(d=>d.id===edit?{...d,...form}:d));
    else setData([...data,{id:uuid(),...form}]);
    setModal(false);
  };

  const fmtDate = (d) => {
    if (!d) return "";
    const [y,m,day] = d.split("-");
    return `${y}/${m}/${day}`;
  };

  return (
    <div>
      {/* Tab switcher */}
      <div style={{display:"flex",gap:0,marginBottom:12,background:T.bg3,borderRadius:12,padding:3}}>
        {["月視圖","趨勢"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{
            flex:1,padding:"7px",borderRadius:10,border:"none",cursor:"pointer",
            background:tab===t?T.card:"transparent",color:tab===t?T.accent3:T.text3,
            fontFamily:"inherit",fontWeight:700,fontSize:13,transition:"all 0.15s",
            boxShadow:tab===t?"0 1px 4px rgba(90,55,30,0.12)":"none",
          }}>{t==="月視圖"?"📅 月視圖":"📈 趨勢"}</button>
        ))}
      </div>

      {tab==="趨勢" ? (
        // ── Trend view ──
        <div>
          <Card>
            <div style={{fontSize:13,fontWeight:700,color:T.text2,marginBottom:16}}>近 12 個月支出趨勢</div>
            {/* Bar chart */}
            <div style={{display:"flex",alignItems:"flex-end",gap:4,height:120,marginBottom:8}}>
              {trendMonths.map((tm,i)=>{
                const isCurrentMonth = tm.y===CY && tm.m===CM;
                const barH = tm.amt ? Math.max((tm.amt/maxTrend)*100, 4) : 0;
                return (
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                    <div style={{fontSize:9,color:T.accent3,fontWeight:700,visibility:tm.amt?"visible":"hidden"}}>
                      {tm.amt>=1000?`${(tm.amt/1000).toFixed(1)}k`:tm.amt}
                    </div>
                    <div style={{
                      width:"100%",height:`${barH}%`,minHeight:tm.amt?4:0,
                      background: isCurrentMonth ? T.accent2 : T.accent2+"66",
                      borderRadius:"4px 4px 0 0",transition:"height 0.4s",
                      border: isCurrentMonth?`1.5px solid ${T.accent3}`:"none",
                    }} />
                  </div>
                );
              })}
            </div>
            {/* Month labels */}
            <div style={{display:"flex",gap:4}}>
              {trendMonths.map((tm,i)=>(
                <div key={i} style={{flex:1,textAlign:"center",fontSize:9,color:tm.y===CY&&tm.m===CM?T.accent3:T.text3,fontWeight:tm.y===CY&&tm.m===CM?700:400}}>
                  {tm.label}
                </div>
              ))}
            </div>
          </Card>

          {/* Monthly totals list */}
          <SectionTitle>各月支出</SectionTitle>
          {[...trendMonths].reverse().filter(tm=>tm.amt>0).map((tm,i)=>(
            <Card key={i}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:14,fontWeight:600,color:T.text}}>{tm.y}年 {MONTHS[tm.m]}</div>
                <div style={{fontSize:15,fontWeight:700,color:T.accent3}}>NT$ {tm.amt.toLocaleString()}</div>
              </div>
              <div style={{height:6,background:T.bg3,borderRadius:3,marginTop:6,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${tm.amt/maxTrend*100}%`,background:T.accent2+"99",borderRadius:3}} />
              </div>
            </Card>
          ))}
          {trendMonths.every(tm=>tm.amt===0) && <EmptyState icon="📈" text="還沒有任何記帳資料" />}
        </div>
      ) : (
        // ── Month view ──
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <Btn small variant="ghost" onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}}>‹</Btn>
            <span style={{flex:1,textAlign:"center",fontWeight:700,color:T.text}}>{year}年 {MONTHS[month]}</span>
            <Btn small variant="ghost" onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}}>›</Btn>
          </div>

          {/* Total + budget */}
          <Card style={{background:overBudget?"#D4847C":T.accent2,border:"none",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{color:"rgba(255,255,255,0.8)",fontSize:13}}>本月總支出</div>
                <div style={{color:"#fff",fontSize:28,fontWeight:700}}>NT$ {total.toLocaleString()}</div>
              </div>
              <button onClick={()=>{setBudgetInput(budget);setBudgetModal(true);}} style={{
                background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.4)",
                borderRadius:8,padding:"4px 10px",color:"#fff",cursor:"pointer",fontSize:12,fontFamily:"inherit",
              }}>
                {budget?"✏️ 預算":"＋ 預算"}
              </button>
            </div>
            {budgetNum>0 && (
              <div style={{marginTop:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"rgba(255,255,255,0.85)",marginBottom:4}}>
                  <span>{overBudget?"⚠️ 超出預算！":""} NT$ {total.toLocaleString()} / {Number(budget).toLocaleString()}</span>
                  <span>{Math.round(budgetUsed)}%</span>
                </div>
                <div style={{height:8,background:"rgba(255,255,255,0.25)",borderRadius:4,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${budgetUsed}%`,background:"rgba(255,255,255,0.85)",borderRadius:4,transition:"width 0.4s"}} />
                </div>
              </div>
            )}
          </Card>

          {/* Category bars */}
          <Card>
            {typeTotals.map((t,i)=>t.amount>0&&(
              <div key={t.type} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
                  <span style={{fontWeight:600,color:T.text}}>{t.type}</span>
                  <span style={{color:T.text3}}>NT$ {t.amount.toLocaleString()} ({total?Math.round(t.amount/total*100):0}%)</span>
                </div>
                <div style={{height:10,background:T.bg3,borderRadius:5,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${total?t.amount/total*100:0}%`,background:EXPENSE_COLORS[i],borderRadius:5}} />
                </div>
              </div>
            ))}
            {total===0 && <EmptyState icon="💰" text="這個月還沒有記帳" />}
          </Card>

          <SectionTitle right={<Btn small onClick={()=>open()}>+ 新增</Btn>}>消費明細</SectionTitle>
          {monthData.length===0 && <EmptyState icon="🧾" text="還沒有消費記錄" />}
          {[...monthData].sort((a,b)=>b.date>a.date?1:-1).map(item=>(
            <Card key={item.id}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:14,fontWeight:600,color:T.text}}>{item.item}</div>
                  <div style={{display:"flex",gap:6,marginTop:2,flexWrap:"wrap"}}>
                    <Tag label={item.type} color={colorFor(item.type)} />
                    <span style={{fontSize:12,color:T.muted}}>{fmtDate(item.date)}</span>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:15,fontWeight:700,color:T.accent3}}>NT$ {Number(item.amount).toLocaleString()}</span>
                  <Btn small variant="ghost" onClick={()=>open(item)}>編輯</Btn>
                  <Btn small variant="danger" onClick={()=>setData(data.filter(d=>d.id!==item.id))}>刪</Btn>
                </div>
              </div>
            </Card>
          ))}
        </div>
      )}

      {/* Add expense modal */}
      <Modal open={modal} onClose={()=>setModal(false)} title={edit?"編輯記帳":"新增記帳"}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Input value={form.item} onChange={v=>setForm(f=>({...f,item:v}))} placeholder="花費項目名稱" />
          <div>
            <div style={{fontSize:12,color:T.text3,marginBottom:4}}>日期</div>
            <Input type="date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))} />
          </div>
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <span style={{fontSize:12,color:T.text3}}>消費類型</span>
              <button onClick={()=>setTypeModal(true)} style={{
                background:"none",border:"none",cursor:"pointer",fontSize:12,color:T.accent2,fontFamily:"inherit",fontWeight:600
              }}>⚙️ 管理類型</button>
            </div>
            <Select value={form.type} onChange={v=>setForm(f=>({...f,type:v}))} options={expenseTypes} />
          </div>
          <Input type="number" value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} placeholder="金額 (NT$)" />
          <Btn onClick={save}>儲存</Btn>
        </div>
      </Modal>

      {/* Type management modal */}
      <Modal open={typeModal} onClose={()=>setTypeModal(false)} title="管理消費類型">
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {expenseTypes.map((t,i)=>(
            <div key={i} style={{display:"flex",gap:8,alignItems:"center"}}>
              <div style={{width:12,height:12,borderRadius:"50%",background:EXPENSE_COLORS[i%EXPENSE_COLORS.length],flexShrink:0}} />
              <span style={{flex:1,fontSize:14,color:T.text}}>{t}</span>
              {expenseTypes.length > 1 && (
                <Btn small variant="danger" onClick={()=>setExpenseTypes(expenseTypes.filter((_,j)=>j!==i))}>刪</Btn>
              )}
            </div>
          ))}
          <div style={{borderTop:`1px solid ${T.border}`,paddingTop:10,display:"flex",gap:8}}>
            <Input value={newTypeName} onChange={setNewTypeName} placeholder="新增類型名稱" />
            <Btn small onClick={()=>{
              if (!newTypeName.trim() || expenseTypes.includes(newTypeName.trim())) return;
              setExpenseTypes([...expenseTypes, newTypeName.trim()]);
              setNewTypeName("");
            }}>新增</Btn>
          </div>
        </div>
      </Modal>

      {/* Budget modal */}
      <Modal open={budgetModal} onClose={()=>setBudgetModal(false)} title="設定每月預算">
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Input type="number" value={budgetInput} onChange={setBudgetInput} placeholder="每月預算金額 (NT$)" />
          <Btn onClick={()=>{setBudget(budgetInput);setBudgetModal(false);}}>確認</Btn>
          {budget && <Btn variant="ghost" onClick={()=>{setBudget("");setBudgetModal(false);}}>移除預算</Btn>}
        </div>
      </Modal>
    </div>
  );
}

function PeriodTracker({ data, setData }) {
  const [startModal, setStartModal] = useState(false);
  const [endModal, setEndModal] = useState(null); // holds item id to end
  const [editModal, setEditModal] = useState(null);
  const [startDate, setStartDate] = useState(new Date().toISOString().slice(0,10));
  const [endDate, setEndDate] = useState("");
  const [notes, setNotes] = useState("");
  const [editForm, setEditForm] = useState({start:"",end:"",notes:""});

  const sorted = [...data].sort((a,b)=>b.start>a.start?1:-1);

  const cycles = sorted.length>1 ? sorted.slice(0,-1).map((_,i)=>{
    const a = new Date(sorted[i+1].start), b = new Date(sorted[i].start);
    return Math.round((b-a)/(1000*60*60*24));
  }) : [];
  const avgCycle = cycles.length ? Math.round(cycles.reduce((s,c)=>s+c,0)/cycles.length) : null;

  const durations = sorted.filter(d=>d.end).map(d=>{
    const a=new Date(d.start), b=new Date(d.end);
    return Math.round((b-a)/(1000*60*60*24))+1;
  });
  const avgDur = durations.length ? Math.round(durations.reduce((s,c)=>s+c,0)/durations.length) : null;

  let nextPrediction = null;
  if (sorted.length && avgCycle) {
    const last = new Date(sorted[0].start);
    last.setDate(last.getDate()+avgCycle);
    nextPrediction = last.toLocaleDateString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit"});
  }

  const saveStart = () => {
    if (!startDate) return;
    setData([...data,{id:uuid(),start:startDate,end:"",notes}]);
    setStartModal(false); setNotes("");
  };

  const saveEnd = () => {
    if (!endDate) return;
    setData(data.map(d=>d.id===endModal?{...d,end:endDate}:d));
    setEndModal(null); setEndDate("");
  };

  const saveEdit = () => {
    setData(data.map(d=>d.id===editModal?{...d,...editForm}:d));
    setEditModal(null);
  };

  const openEdit = (item) => {
    setEditForm({start:item.start,end:item.end||"",notes:item.notes||""});
    setEditModal(item.id);
  };

  const statCards = [
    {label:"平均週期", value: avgCycle ? `${avgCycle} 天` : "--"},
    {label:"平均經期長度", value: avgDur ? `${avgDur} 天` : "--"},
    {label:"預計下次到來", value: nextPrediction||"--", full:true},
  ];

  return (
    <div>
      <SectionTitle right={<Btn small onClick={()=>setStartModal(true)}>🩸 記錄開始</Btn>}>🌸 生理期追蹤</SectionTitle>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        {statCards.map((s,i)=>(
          <Card key={i} style={{textAlign:"center",margin:0,gridColumn:s.full?"1/-1":"auto",padding:"12px 8px"}}>
            <div style={{fontSize:11,color:T.text3,marginBottom:2}}>{s.label}</div>
            <div style={{fontSize:17,fontWeight:700,color:T.accent3}}>{s.value}</div>
          </Card>
        ))}
      </div>

      {sorted.length===0 && <EmptyState icon="🌸" text="點「記錄開始」來記錄生理期第一天" />}
      {sorted.map(item=>{
        const dur = item.end ? Math.round((new Date(item.end)-new Date(item.start))/(1000*60*60*24))+1 : null;
        const ongoing = !item.end;
        return (
          <Card key={item.id} style={{borderLeft:`3px solid ${ongoing?T.pink:T.border2}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                  <span style={{fontSize:14,fontWeight:600,color:T.text}}>{item.start}</span>
                  {item.end && <span style={{fontSize:13,color:T.text3}}>~ {item.end}</span>}
                  {ongoing && <Tag label="進行中" color={T.pink} />}
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {dur && <Tag label={`${dur} 天`} color={T.pink} />}
                  {ongoing && <Btn small variant="secondary" onClick={()=>{setEndDate(new Date().toISOString().slice(0,10));setEndModal(item.id);}}>記錄結束</Btn>}
                </div>
                {item.notes && <p style={{margin:"6px 0 0",fontSize:12,color:T.text3}}>{item.notes}</p>}
              </div>
              <div style={{display:"flex",gap:4}}>
                <Btn small variant="ghost" onClick={()=>openEdit(item)}>編輯</Btn>
                <Btn small variant="danger" onClick={()=>setData(data.filter(d=>d.id!==item.id))}>刪</Btn>
              </div>
            </div>
          </Card>
        );
      })}

      {/* Start Modal */}
      <Modal open={startModal} onClose={()=>setStartModal(false)} title="記錄生理期開始">
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div><div style={{fontSize:13,color:T.text3,marginBottom:4}}>開始日期</div>
            <Input type="date" value={startDate} onChange={setStartDate} /></div>
          <Textarea value={notes} onChange={setNotes} placeholder="備註（選填）" rows={2} />
          <Btn onClick={saveStart}>記錄開始</Btn>
        </div>
      </Modal>

      {/* End Modal */}
      <Modal open={!!endModal} onClose={()=>setEndModal(null)} title="記錄生理期結束">
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div><div style={{fontSize:13,color:T.text3,marginBottom:4}}>結束日期</div>
            <Input type="date" value={endDate} onChange={setEndDate} /></div>
          <Btn onClick={saveEnd}>確認結束</Btn>
        </div>
      </Modal>

      {/* Edit Modal */}
      <Modal open={!!editModal} onClose={()=>setEditModal(null)} title="編輯紀錄">
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div><div style={{fontSize:13,color:T.text3,marginBottom:4}}>開始日期</div>
            <Input type="date" value={editForm.start} onChange={v=>setEditForm(f=>({...f,start:v}))} /></div>
          <div><div style={{fontSize:13,color:T.text3,marginBottom:4}}>結束日期</div>
            <Input type="date" value={editForm.end} onChange={v=>setEditForm(f=>({...f,end:v}))} /></div>
          <Textarea value={editForm.notes} onChange={v=>setEditForm(f=>({...f,notes:v}))} placeholder="備註" rows={2} />
          <Btn onClick={saveEdit}>儲存</Btn>
        </div>
      </Modal>
    </div>
  );
}

function Bookmarks({ data, setData }) {
  const [folderModal, setFolderModal] = useState(false);
  const [editFolderModal, setEditFolderModal] = useState(null);
  const [folderName, setFolderName] = useState("");
  const [openFolder, setOpenFolder] = useStorage("bookmarks-open-folder", null);
  const [newItem, setNewItem] = useState("");
  const [newRating, setNewRating] = useState("");
  const [newStatus, setNewStatus] = useState("");
  const [editItemId, setEditItemId] = useState(null);
  const [editItemText, setEditItemText] = useState("");
  const [editItemRating, setEditItemRating] = useState("");
  const [editItemStatus, setEditItemStatus] = useState("");
  const [searchQuery, setSearchQuery] = useState("");
  const [filterRating, setFilterRating] = useState("全部");
  const [filterStatus, setFilterStatus] = useState("全部");
  const [ratingModal, setRatingModal] = useState(false);
  const [statusModal, setStatusModal] = useState(false);
  const [folderRatings, setFolderRatings] = useState([]);
  const [folderStatuses, setFolderStatuses] = useState([]);
  const inputRef = useRef();

  const folders = data || [];
  const folder = openFolder ? folders.find(f=>f.id===openFolder) : null;

  useEffect(() => {
    if (openFolder && !folder) setOpenFolder(null);
  }, [openFolder, folder]);

  // Normalize ratings: always array of {name, color}
  const normRatings = (r) => {
    if (!r || r.length===0) return [{name:"頂級",color:"#FFD700"},{name:"好看",color:"#C8966E"},{name:"普通",color:"#A8C5A0"}];
    return r.map(x => typeof x==="string" ? {name:x, color:T.accent2} : x);
  };

  // Normalize statuses: always array of {name, color}
  const normStatuses = (s) => {
    if (!s || s.length===0) return [{name:"完成",color:"#A8C5A0"},{name:"未完成",color:"#C4A882"}];
    return s.map(x => typeof x==="string" ? {name:x, color:T.accent2} : x);
  };

  useEffect(() => {
    if (folder) {
      setFolderRatings(normRatings(folder.ratings));
      setFolderStatuses(normStatuses(folder.statuses));
      setSearchQuery("");
      setFilterRating("全部");
      setFilterStatus("全部");
      setNewRating("");
      setNewStatus("");
    }
  }, [openFolder]);

  const addFolder = () => {
    if (!folderName.trim()) return;
    const f = {id:uuid(), name:folderName.trim(), items:[],
      ratings:[{name:"頂級",color:"#FFD700"},{name:"好看",color:"#C8966E"},{name:"普通",color:"#A8C5A0"}],
      statuses:[{name:"完成",color:"#A8C5A0"},{name:"未完成",color:"#C4A882"}]};
    setData([...folders, f]);
    setFolderName(""); setFolderModal(false);
    setOpenFolder(f.id);
  };

  const renameFolder = () => {
    if (!folderName.trim()) return;
    setData(folders.map(f=>f.id===editFolderModal?{...f,name:folderName.trim()}:f));
    setEditFolderModal(null); setFolderName("");
  };

  const delFolder = (id) => {
    setData(folders.filter(f=>f.id!==id));
    if (openFolder===id) setOpenFolder(null);
  };

  const addItem = () => {
    if (!newItem.trim()) return;
    setData(folders.map(f=>{
      if (f.id!==openFolder) return f;
      const defStatus = normStatuses(f.statuses)[0]?.name || "未完成";
      return {...f, items:[...f.items, {
        id:uuid(), text:newItem.trim(),
        rating: newRating || "",
        status: newStatus || defStatus,
        ts: new Date().toISOString()
      }]};
    }));
    setNewItem(""); setNewRating(""); setNewStatus("");
    setTimeout(()=>inputRef.current?.focus(), 50);
  };

  const saveEditItem = () => {
    if (!editItemText.trim()) return;
    setData(folders.map(f=>f.id===openFolder
      ? {...f, items:f.items.map(it=>it.id===editItemId
          ? {...it, text:editItemText.trim(), rating:editItemRating, status:editItemStatus}
          : it)}
      : f));
    setEditItemId(null); setEditItemText(""); setEditItemRating(""); setEditItemStatus("");
  };

  const toggleStatus = (fid, iid) => {
    const f = folders.find(x=>x.id===fid);
    const statNames = normStatuses(f?.statuses).map(s=>s.name);
    setData(folders.map(fo=>fo.id===fid
      ? {...fo, items:fo.items.map(it=>{
          if (it.id!==iid) return it;
          const idx = statNames.indexOf(it.status);
          return {...it, status:statNames[(idx+1)%statNames.length]};
        })}
      : fo));
  };

  const delItem = (fid, iid) => {
    setData(folders.map(f=>f.id===fid?{...f,items:f.items.filter(it=>it.id!==iid)}:f));
  };

  const getRatingColor = (rName, ratings) => {
    const found = normRatings(ratings).find(r=>r.name===rName);
    return found ? {bg:found.color+"33",border:found.color,text:found.color} : {bg:T.bg3,border:T.border2,text:T.text3};
  };

  const getStatusColor = (sName, statuses) => {
    const found = normStatuses(statuses).find(s=>s.name===sName);
    return found?.color || T.muted;
  };

  // ── Folder interior ──
  if (openFolder && folder) {
    const curRatings = normRatings(folder.ratings);
    const curStatuses = normStatuses(folder.statuses);

    const visible = [...folder.items].reverse().filter(item => {
      const ms = !searchQuery.trim() || item.text.toLowerCase().includes(searchQuery.toLowerCase());
      const mr = filterRating==="全部" || item.rating===filterRating || (filterRating==="未分級"&&!item.rating);
      const mst = filterStatus==="全部" || item.status===filterStatus;
      return ms && mr && mst;
    });

    return (
      <div>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12}}>
          <Btn small variant="ghost" onClick={()=>setOpenFolder(null)}>← 返回</Btn>
          <span style={{fontSize:15,fontWeight:700,color:T.text,flex:1}}>📁 {folder.name}</span>
          <Btn small variant="ghost" onClick={()=>{setFolderStatuses(normStatuses(folder.statuses));setStatusModal(true);}}>⚙️ 狀態</Btn>
          <Btn small variant="ghost" onClick={()=>{setFolderRatings(normRatings(folder.ratings));setRatingModal(true);}}>⚙️ 分級</Btn>
        </div>

        {/* Add item */}
        <Card style={{marginBottom:12,background:T.accent2+"11",border:`1.5px solid ${T.accent2}`}}>
          <div style={{fontSize:12,color:T.accent3,fontWeight:700,marginBottom:8}}>✏️ 新增到「{folder.name}」</div>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
            <input ref={inputRef} value={newItem} onChange={e=>setNewItem(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addItem()} placeholder="輸入內容..."
              style={{flex:1,padding:"10px 14px",borderRadius:10,border:`1.5px solid ${T.border}`,
                background:T.card,color:T.text,fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}} />
            <Btn small onClick={addItem}>新增</Btn>
          </div>
          {/* Status chips */}
          {curStatuses.length>0 && (
            <div style={{marginBottom:6}}>
              <div style={{fontSize:11,color:T.text3,marginBottom:4}}>狀態</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {curStatuses.map(s=>(
                  <button key={s.name} onClick={()=>setNewStatus(newStatus===s.name?"":s.name)} style={{
                    padding:"3px 10px",borderRadius:16,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",
                    border:`1.5px solid ${newStatus===s.name?s.color:T.border}`,
                    background:newStatus===s.name?s.color+"33":T.card,
                    color:newStatus===s.name?s.color:T.text3,
                  }}>{s.name}</button>
                ))}
              </div>
            </div>
          )}
          {/* Rating chips */}
          {curRatings.length>0 && (
            <div>
              <div style={{fontSize:11,color:T.text3,marginBottom:4}}>分級</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <button onClick={()=>setNewRating("")} style={{
                  padding:"3px 10px",borderRadius:16,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",
                  border:`1.5px solid ${newRating===""?T.accent2:T.border}`,
                  background:newRating===""?T.accent2+"22":T.card,color:newRating===""?T.accent3:T.text3,
                }}>未分級</button>
                {curRatings.map(r=>{
                  const col=getRatingColor(r.name,folder.ratings);
                  return (
                    <button key={r.name} onClick={()=>setNewRating(r.name)} style={{
                      padding:"3px 10px",borderRadius:16,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",
                      border:`1.5px solid ${newRating===r.name?col.border:T.border}`,
                      background:newRating===r.name?col.bg:T.card,color:newRating===r.name?col.text:T.text3,
                    }}>{r.name}</button>
                  );
                })}
              </div>
            </div>
          )}
        </Card>

        {/* Search */}
        <div style={{position:"relative",marginBottom:8}}>
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,pointerEvents:"none"}}>🔍</span>
          <input value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="搜尋..."
            style={{width:"100%",padding:"8px 36px 8px 34px",borderRadius:10,
              border:`1.5px solid ${searchQuery?T.accent2:T.border}`,background:T.card,color:T.text,
              fontSize:13,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}} />
          {searchQuery && <button onClick={()=>setSearchQuery("")} style={{position:"absolute",right:10,top:"50%",
            transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:16}}>✕</button>}
        </div>

        {/* Filter chips - status */}
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4,marginBottom:6}}>
          {["全部",...curStatuses.map(s=>s.name)].map(s=>{
            const color = curStatuses.find(x=>x.name===s)?.color || T.accent2;
            const active = filterStatus===s;
            const count = s==="全部"?folder.items.length:folder.items.filter(i=>i.status===s).length;
            return (
              <button key={s} onClick={()=>setFilterStatus(s)} style={{
                padding:"4px 12px",borderRadius:20,flexShrink:0,fontSize:12,fontWeight:600,
                cursor:"pointer",fontFamily:"inherit",
                border:`1.5px solid ${active?color:T.border}`,
                background:active?color+"33":T.card,color:active?color:T.text3,
              }}>{s} ({count})</button>
            );
          })}
        </div>

        {/* Filter chips - rating */}
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6,marginBottom:10}}>
          {["全部",...curRatings.map(r=>r.name),"未分級"].map(r=>{
            const active = filterRating===r;
            const count = r==="全部"?folder.items.length:r==="未分級"?folder.items.filter(i=>!i.rating).length:folder.items.filter(i=>i.rating===r).length;
            const col = getRatingColor(r, folder.ratings);
            return (
              <button key={r} onClick={()=>setFilterRating(r)} style={{
                padding:"4px 12px",borderRadius:20,flexShrink:0,fontSize:12,fontWeight:600,
                cursor:"pointer",fontFamily:"inherit",
                border:`1.5px solid ${active?(r==="全部"||r==="未分級"?T.accent2:col.border):T.border}`,
                background:active?(r==="全部"||r==="未分級"?T.accent2+"22":col.bg):T.card,
                color:active?(r==="全部"||r==="未分級"?T.accent3:col.text):T.text3,
              }}>{r} ({count})</button>
            );
          })}
        </div>

        {/* Items */}
        {visible.length===0 && <EmptyState icon="📝" text={searchQuery||filterRating!=="全部"||filterStatus!=="全部"?"沒有符合條件的記錄":"新增第一筆記錄吧！"} />}
        {visible.map(item=>(
          <Card key={item.id} style={{marginBottom:6}}>
            {editItemId===item.id ? (
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <input value={editItemText} onChange={e=>setEditItemText(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&saveEditItem()} autoFocus
                  style={{padding:"8px 12px",borderRadius:8,border:`1.5px solid ${T.border}`,
                    background:T.card,color:T.text,fontSize:14,fontFamily:"inherit",outline:"none"}} />
                <div style={{fontSize:11,color:T.text3}}>狀態</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {curStatuses.map(s=>(
                    <button key={s.name} onClick={()=>setEditItemStatus(s.name)} style={{
                      padding:"3px 10px",borderRadius:16,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",
                      border:`1.5px solid ${editItemStatus===s.name?s.color:T.border}`,
                      background:editItemStatus===s.name?s.color+"33":T.card,
                      color:editItemStatus===s.name?s.color:T.text3,
                    }}>{s.name}</button>
                  ))}
                </div>
                <div style={{fontSize:11,color:T.text3}}>分級</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <button onClick={()=>setEditItemRating("")} style={{
                    padding:"3px 10px",borderRadius:16,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",
                    border:`1.5px solid ${editItemRating===""?T.accent2:T.border}`,
                    background:editItemRating===""?T.accent2+"22":T.card,color:editItemRating===""?T.accent3:T.text3,
                  }}>未分級</button>
                  {curRatings.map(r=>{
                    const col=getRatingColor(r.name,folder.ratings);
                    return (
                      <button key={r.name} onClick={()=>setEditItemRating(r.name)} style={{
                        padding:"3px 10px",borderRadius:16,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",
                        border:`1.5px solid ${editItemRating===r.name?col.border:T.border}`,
                        background:editItemRating===r.name?col.bg:T.card,color:editItemRating===r.name?col.text:T.text3,
                      }}>{r.name}</button>
                    );
                  })}
                </div>
                <div style={{display:"flex",gap:6}}>
                  <Btn small onClick={saveEditItem}>確認</Btn>
                  <Btn small variant="ghost" onClick={()=>setEditItemId(null)}>取消</Btn>
                </div>
              </div>
            ) : (
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                {/* Status badge - click to cycle */}
                {(() => {
                  const sColor = getStatusColor(item.status, folder.statuses);
                  return (
                    <div onClick={()=>toggleStatus(openFolder,item.id)} style={{
                      flexShrink:0,cursor:"pointer",padding:"2px 8px",borderRadius:12,
                      border:`1.5px solid ${sColor}`,background:sColor+"33",
                      fontSize:11,fontWeight:700,color:sColor,whiteSpace:"nowrap",
                    }}>{item.status||curStatuses[0]?.name||""}</div>
                  );
                })()}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,color:T.text,lineHeight:1.4,marginBottom:3}}>{item.text}</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    {item.rating && (()=>{
                      const col=getRatingColor(item.rating,folder.ratings);
                      return <span style={{fontSize:11,fontWeight:700,padding:"1px 7px",borderRadius:10,
                        background:col.bg,border:`1px solid ${col.border}`,color:col.text}}>{item.rating}</span>;
                    })()}
                    <span style={{fontSize:11,color:T.muted}}>{new Date(item.ts).toLocaleDateString("zh-TW")}</span>
                  </div>
                </div>
                <div style={{display:"flex",gap:4,flexShrink:0}}>
                  <Btn small variant="ghost" onClick={()=>{
                    setEditItemId(item.id);setEditItemText(item.text);
                    setEditItemRating(item.rating||"");
                    setEditItemStatus(item.status||curStatuses[0]?.name||"");
                  }}>編輯</Btn>
                  <Btn small variant="danger" onClick={()=>delItem(openFolder,item.id)}>刪</Btn>
                </div>
              </div>
            )}
          </Card>
        ))}

        {/* Rating Modal */}
        <Modal open={ratingModal} onClose={()=>setRatingModal(false)} title="管理分級">
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {folderRatings.map((r,i)=>{
              const item = typeof r==="string"?{name:r,color:"#C8966E"}:r;
              return (
                <div key={i} style={{background:T.bg2,borderRadius:10,padding:"10px 12px"}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
                    <div style={{width:14,height:14,borderRadius:"50%",background:item.color,flexShrink:0}} />
                    <input value={item.name}
                      onChange={e=>{const n=[...folderRatings];n[i]={...item,name:e.target.value};setFolderRatings(n);}}
                      placeholder="分級名稱"
                      style={{flex:1,padding:"6px 10px",borderRadius:8,border:`1.5px solid ${T.border}`,
                        background:T.card,color:T.text,fontSize:13,fontFamily:"inherit",outline:"none"}} />
                    <Btn small variant="danger" onClick={()=>setFolderRatings(folderRatings.filter((_,j)=>j!==i))}>刪</Btn>
                  </div>
                  <ColorPicker value={item.color}
                    onChange={c=>{const n=[...folderRatings];n[i]={...item,color:c};setFolderRatings(n);}}
                    label="顏色" />
                </div>
              );
            })}
            <Btn variant="secondary" onClick={()=>setFolderRatings([...folderRatings,{name:"",color:"#C8966E"}])}>+ 新增分級</Btn>
            <Btn onClick={()=>{
              const valid=folderRatings.filter(r=>(typeof r==="string"?r:r.name).trim());
              setData(folders.map(f=>f.id===openFolder?{...f,ratings:valid}:f));
              setFolderRatings(valid);
              setRatingModal(false);
            }}>儲存</Btn>
          </div>
        </Modal>

        {/* Status Modal */}
        <Modal open={statusModal} onClose={()=>setStatusModal(false)} title="管理狀態">
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{fontSize:12,color:T.text3}}>點擊項目的狀態標籤可循環切換</div>
            {folderStatuses.map((s,i)=>{
              const item = typeof s==="string"?{name:s,color:T.accent2}:s;
              return (
                <div key={i} style={{background:T.bg2,borderRadius:10,padding:"10px 12px"}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
                    <div style={{width:14,height:14,borderRadius:"50%",background:item.color,flexShrink:0}} />
                    <input value={item.name}
                      onChange={e=>{const n=[...folderStatuses];n[i]={...item,name:e.target.value};setFolderStatuses(n);}}
                      placeholder="狀態名稱"
                      style={{flex:1,padding:"6px 10px",borderRadius:8,border:`1.5px solid ${T.border}`,
                        background:T.card,color:T.text,fontSize:13,fontFamily:"inherit",outline:"none"}} />
                    {folderStatuses.length>1 && (
                      <Btn small variant="danger" onClick={()=>setFolderStatuses(folderStatuses.filter((_,j)=>j!==i))}>刪</Btn>
                    )}
                  </div>
                  <ColorPicker value={item.color}
                    onChange={c=>{const n=[...folderStatuses];n[i]={...item,color:c};setFolderStatuses(n);}}
                    label="顏色" />
                </div>
              );
            })}
            <Btn variant="secondary" onClick={()=>setFolderStatuses([...folderStatuses,{name:"",color:T.accent2}])}>+ 新增狀態</Btn>
            <Btn onClick={()=>{
              const valid=folderStatuses.filter(s=>(typeof s==="string"?s:s.name).trim());
              setData(folders.map(f=>f.id===openFolder?{...f,statuses:valid}:f));
              setFolderStatuses(valid);
              setStatusModal(false);
            }}>儲存</Btn>
          </div>
        </Modal>
      </div>
    );
  }

  // ── Folder list ──
  return (
    <div>
      <SectionTitle right={<Btn small onClick={()=>{setFolderName("");setFolderModal(true);}}>+ 新增資料夾</Btn>}>🔖 收藏夾</SectionTitle>
      {folders.length===0 && <EmptyState icon="📁" text="新增資料夾來分類收藏內容" />}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {folders.map(f=>(
          <Card key={f.id} style={{margin:0,padding:"14px 16px"}}>
            <div onClick={()=>setOpenFolder(f.id)} style={{cursor:"pointer",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:24}}>📁</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,fontWeight:700,color:T.text}}>{f.name}</div>
                  <div style={{fontSize:12,color:T.muted}}>{f.items.length} 筆記錄</div>
                </div>
                <span style={{fontSize:18,color:T.accent2}}>›</span>
              </div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <Btn small style={{flex:1}} onClick={()=>setOpenFolder(f.id)}>📂 開啟資料夾</Btn>
              <Btn small variant="ghost" onClick={()=>{setFolderName(f.name);setEditFolderModal(f.id);}}>改名</Btn>
              <Btn small variant="danger" onClick={()=>delFolder(f.id)}>刪</Btn>
            </div>
          </Card>
        ))}
      </div>

      <Modal open={folderModal} onClose={()=>setFolderModal(false)} title="新增資料夾">
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Input value={folderName} onChange={setFolderName} placeholder="資料夾名稱" />
          <Btn onClick={addFolder}>建立</Btn>
        </div>
      </Modal>
      <Modal open={!!editFolderModal} onClose={()=>setEditFolderModal(null)} title="重新命名">
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Input value={folderName} onChange={setFolderName} placeholder="新名稱" />
          <Btn onClick={renameFolder}>確認</Btn>
        </div>
      </Modal>
    </div>
  );
}

function Memos({ data, setData }) {
  const [modal, setModal] = useState(false);
  const [edit, setEdit] = useState(null);
  const [form, setForm] = useState({ title:"", content:"" });

  const open = (item=null) => {
    if (item) { setEdit(item.id); setForm({title:item.title,content:item.content}); }
    else { setEdit(null); setForm({title:"",content:""}); }
    setModal(true);
  };

  const [query, setQuery] = useState("");

  const save = () => {
    if (!form.title.trim()) return;
    if (edit) setData(data.map(d=>d.id===edit?{...d,...form,updated:new Date().toISOString()}:d));
    else setData([...data,{id:uuid(),...form,ts:new Date().toISOString()}]);
    setModal(false);
  };

  const filtered = query.trim()
    ? data.filter(d =>
        d.title.toLowerCase().includes(query.toLowerCase()) ||
        (d.content||"").toLowerCase().includes(query.toLowerCase())
      )
    : data;

  const highlight = (text, q) => {
    if (!q.trim() || !text) return text;
    const idx = text.toLowerCase().indexOf(q.toLowerCase());
    if (idx === -1) return text;
    return (
      <>
        {text.slice(0, idx)}
        <mark style={{background:T.yellow,borderRadius:3,padding:"0 1px"}}>{text.slice(idx, idx+q.length)}</mark>
        {text.slice(idx+q.length)}
      </>
    );
  };

  return (
    <div>
      <SectionTitle right={<Btn small onClick={()=>open()}>+ 新增</Btn>}>📋 備忘錄</SectionTitle>
      {/* Search bar */}
      <div style={{position:"relative",marginBottom:12}}>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:15,pointerEvents:"none"}}>🔍</span>
        <input
          value={query}
          onChange={e=>setQuery(e.target.value)}
          placeholder="搜尋標題或內容..."
          style={{
            width:"100%",padding:"9px 14px 9px 36px",borderRadius:12,
            border:`1.5px solid ${query?T.accent2:T.border}`,
            background:T.card,color:T.text,fontSize:13,fontFamily:"inherit",
            outline:"none",boxSizing:"border-box",
          }}
        />
        {query && (
          <button onClick={()=>setQuery("")} style={{
            position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
            background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:16,lineHeight:1,
          }}>✕</button>
        )}
      </div>
      {query && (
        <div style={{fontSize:12,color:T.text3,marginBottom:8}}>
          找到 {filtered.length} 筆結果
        </div>
      )}
      {filtered.length===0
        ? <EmptyState icon={query?"🔍":"📋"} text={query?`找不到「${query}」相關的備忘錄`:"記下重要事項！"} />
        : [...filtered].sort((a,b)=>b.ts>a.ts?1:-1).map(item=>(
          <Card key={item.id}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:4}}>
                  {highlight(item.title, query)}
                </div>
                <p style={{margin:"0 0 6px",fontSize:13,color:T.text2,lineHeight:1.6,whiteSpace:"pre-wrap"}}>
                  {highlight(item.content, query)}
                </p>
                <div style={{fontSize:11,color:T.muted}}>{new Date(item.updated||item.ts).toLocaleString("zh-TW")}</div>
              </div>
              <div style={{display:"flex",gap:4,marginLeft:8}}>
                <Btn small variant="ghost" onClick={()=>open(item)}>編輯</Btn>
                <Btn small variant="danger" onClick={()=>setData(data.filter(d=>d.id!==item.id))}>刪</Btn>
              </div>
            </div>
          </Card>
        ))
      }
      <Modal open={modal} onClose={()=>setModal(false)} title={edit?"編輯備忘錄":"新增備忘錄"}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Input value={form.title} onChange={v=>setForm(f=>({...f,title:v}))} placeholder="標題" />
          <Textarea value={form.content} onChange={v=>setForm(f=>({...f,content:v}))} placeholder="內容..." rows={6} />
          <Btn onClick={save}>儲存</Btn>
        </div>
      </Modal>
    </div>
  );
}

const WEEKDAYS = ["週一","週二","週三","週四","週五","週六","週日"];

function CourseManagement({ courses, setCourses, gradReq, setGradReq, semester }) {
  const [modal, setModal] = useState(false);
  const [edit, setEdit] = useState(null);
  const [form, setForm] = useState({ name:"", type:"必修", teacher:"", day:"週一", startTime:"", endTime:"", credits:"" });
  const [reqModal, setReqModal] = useState(false);
  const [customTypes, setCustomTypes] = useStorage("customCourseTypes", []);
  const [newType, setNewType] = useState("");

  const allTypes = [...COURSE_TYPES_DEFAULT, ...customTypes];
  const semCourses = courses.filter(c=>c.semester===semester);
  const allCourses = courses;

  const open = (item=null) => {
    if (item) { setEdit(item.id); setForm({name:item.name,type:item.type,teacher:item.teacher||"",day:item.day||"週一",startTime:item.startTime||"",endTime:item.endTime||"",credits:item.credits||""}); }
    else { setEdit(null); setForm({name:"",type:"必修",teacher:"",day:"週一",startTime:"",endTime:"",credits:""}); }
    setModal(true);
  };

  const save = () => {
    if (!form.name.trim()) return;
    if (edit) setCourses(courses.map(d=>d.id===edit?{...d,...form}:d));
    else setCourses([...courses,{id:uuid(),semester,...form}]);
    setModal(false);
  };

  // Accumulate credits up to this semester
  const semIdx = SEMESTERS.indexOf(semester);
  const pastAndCurrentCourses = allCourses.filter(c=>SEMESTERS.indexOf(c.semester)<=semIdx);
  const totalAcc = pastAndCurrentCourses.reduce((s,c)=>s+Number(c.credits||0),0);
  const semTotal = semCourses.reduce((s,c)=>s+Number(c.credits||0),0);

  const typeAcc = allTypes.map(t=>({
    type:t,
    semCredits: semCourses.filter(c=>c.type===t).reduce((s,c)=>s+Number(c.credits||0),0),
    acc: pastAndCurrentCourses.filter(c=>c.type===t).reduce((s,c)=>s+Number(c.credits||0),0),
    req: gradReq?.types?.[t]||0,
  }));

  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <Btn small variant="secondary" style={{flex:1}} onClick={()=>setReqModal(true)}>⚙️ 設定學分需求</Btn>
        <Btn small onClick={()=>open()}>+ 新增課程</Btn>
      </div>

      <Card style={{marginBottom:12}}>
        <div style={{fontSize:13,color:T.text3,marginBottom:8,fontWeight:600}}>學分統計</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <div style={{background:T.bg2,borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
            <div style={{fontSize:11,color:T.text3,marginBottom:2}}>本學期</div>
            <div style={{fontSize:18,fontWeight:700,color:T.accent2}}>{semTotal} 學分</div>
          </div>
          <div style={{background:T.bg2,borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
            <div style={{fontSize:11,color:T.text3,marginBottom:2}}>累積總計</div>
            <div style={{fontSize:18,fontWeight:700,color:T.accent3}}>{totalAcc} / {gradReq?.total||"--"}</div>
          </div>
        </div>
        {typeAcc.filter(t=>t.req>0||t.acc>0).map(t=>(
          <div key={t.type} style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4,alignItems:"center"}}>
            <span style={{color:T.text2}}>{t.type}</span>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontSize:12,color:T.text3}}>本學期 {t.semCredits}</span>
              <span style={{color:T.accent3,fontWeight:600}}>{t.acc}{t.req?`/${t.req}`:""}</span>
            </div>
          </div>
        ))}
      </Card>

      <SectionTitle>{semester} 課程</SectionTitle>
      {semCourses.length===0 && <EmptyState icon="📚" text="還沒有課程" />}
      {semCourses.map(c=>(
        <Card key={c.id}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:T.text}}>{c.name}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
                <Tag label={c.type} color={T.bg3} />
                <Tag label={`${c.credits||0}學分`} color={T.yellow} />
                {c.teacher && <Tag label={c.teacher} color={T.bg2} />}
                {c.day && <Tag label={`${c.day} ${c.startTime||""}${c.endTime?`~${c.endTime}`:""}`} color={T.blue} />}
              </div>
            </div>
            <div style={{display:"flex",gap:4}}>
              <Btn small variant="ghost" onClick={()=>open(c)}>編輯</Btn>
              <Btn small variant="danger" onClick={()=>setCourses(courses.filter(d=>d.id!==c.id))}>刪</Btn>
            </div>
          </div>
        </Card>
      ))}

      <Modal open={modal} onClose={()=>setModal(false)} title={edit?"編輯課程":"新增課程"}>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <Input value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="課程名稱" />
          <Select value={form.type} onChange={v=>setForm(f=>({...f,type:v}))} options={allTypes} />
          <Input value={form.teacher} onChange={v=>setForm(f=>({...f,teacher:v}))} placeholder="老師（選填）" />
          <Select value={form.day} onChange={v=>setForm(f=>({...f,day:v}))} options={WEEKDAYS} />
          <div style={{display:"flex",gap:8}}>
            <Input type="time" value={form.startTime} onChange={v=>setForm(f=>({...f,startTime:v}))} style={{flex:1}} />
            <Input type="time" value={form.endTime} onChange={v=>setForm(f=>({...f,endTime:v}))} style={{flex:1}} />
          </div>
          <Input type="number" value={form.credits} onChange={v=>setForm(f=>({...f,credits:v}))} placeholder="學分數" />
          <Btn onClick={save}>儲存</Btn>
        </div>
      </Modal>

      <Modal open={reqModal} onClose={()=>setReqModal(false)} title="設定畢業學分需求">
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <Input type="number" value={gradReq?.total||""} onChange={v=>setGradReq(r=>({...r,total:v}))} placeholder="畢業總學分" />
          {allTypes.map(t=>(
            <div key={t} style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:13,color:T.text,width:80,flexShrink:0}}>{t}</span>
              <Input type="number" value={gradReq?.types?.[t]||""} onChange={v=>setGradReq(r=>({...r,types:{...r?.types,[t]:v}}))} placeholder={`${t}需求學分`} />
            </div>
          ))}
          <div style={{borderTop:`1px solid ${T.border}`,paddingTop:10}}>
            <div style={{fontSize:13,color:T.text3,marginBottom:6}}>新增課程類型</div>
            <div style={{display:"flex",gap:8}}>
              <Input value={newType} onChange={setNewType} placeholder="自訂類型名稱" />
              <Btn small onClick={()=>{if(newType.trim()&&!allTypes.includes(newType.trim())){setCustomTypes([...customTypes,newType.trim()]);setNewType("");}}} style={{flexShrink:0}}>新增</Btn>
            </div>
          </div>
        </div>
      </Modal>
    </div>
  );
}

function CourseSchedule({ courses, semester }) {
  const semCourses = courses.filter(c => c.semester === semester && c.day && c.startTime);

  const toMins = (t) => {
    if (!t) return null;
    const [h, m] = t.split(":").map(Number);
    return h * 60 + (m || 0);
  };

  // Colour palette — one stable colour per course
  const COURSE_COLORS = [
    { bg: T.accent2+"44", border: T.accent2,   text: T.accent3 },
    { bg: T.blue+"55",    border: "#7090b0",   text: "#3a5a7a" },
    { bg: T.green+"66",   border: "#70a068",   text: "#2d5a28" },
    { bg: T.pink+"66",    border: "#c07880",   text: "#7a3040" },
    { bg: T.yellow+"77",  border: "#b09020",   text: "#6a4a00" },
    { bg: "#d0b8d855",    border: "#9068a0",   text: "#503060" },
    { bg: "#b8d4d055",    border: "#508080",   text: "#2a5050" },
  ];
  const colorFor = (id) => {
    const idx = semCourses.findIndex(c => c.id === id);
    return COURSE_COLORS[idx % COURSE_COLORS.length];
  };

  if (semCourses.length === 0) {
    return (
      <div>
        <SectionTitle>{semester} 課表</SectionTitle>
        <EmptyState icon="🗓" text="在課程管理新增課程後即可顯示" />
      </div>
    );
  }

  // ── Fixed full-day range 08:00–22:00 at compressed scale ──
  // 14 hours × 60 min × 0.55 px ≈ 462px — fits one phone screen without scrolling
  const HOUR_START  = 8;
  const HOUR_END    = 22;
  const PX_PER_MIN  = 0.55;
  const earliestMin = HOUR_START * 60;
  const latestMin   = HOUR_END   * 60;
  const totalMins   = latestMin - earliestMin;
  const GRID_H      = totalMins * PX_PER_MIN;   // ≈ 462px
  const TIME_COL_W  = 30;

  // Show all weekdays Mon–Sun (keep empty cols so layout is consistent)
  const activeDays = WEEKDAYS;   // Mon → Sun, always 7 columns

  // Hour labels within the window
  const hourLabels = [];
  for (let m = earliestMin; m <= latestMin; m += 60) hourLabels.push(m / 60);

  return (
    <div>
      <SectionTitle>{semester} 課表</SectionTitle>

      {/* Legend: course name → colour chip */}
      <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:10 }}>
        {semCourses.map(c => {
          const col = colorFor(c.id);
          return (
            <div key={c.id} style={{
              display:"flex", alignItems:"center", gap:4,
              padding:"2px 8px", borderRadius:20, fontSize:11, fontWeight:600,
              background: col.bg, border:`1px solid ${col.border}`, color: col.text,
            }}>
              {c.name}
            </div>
          );
        })}
      </div>

      <div style={{ overflowX:"auto" }}>
        <div style={{ minWidth: TIME_COL_W + activeDays.length * 44 }}>

          {/* Day header */}
          <div style={{
            display:"grid",
            gridTemplateColumns:`${TIME_COL_W}px repeat(${activeDays.length},1fr)`,
            borderBottom:`1px solid ${T.border}`, marginBottom:2,
          }}>
            <div />
            {activeDays.map(d => (
              <div key={d} style={{
                textAlign:"center", fontSize:11, fontWeight:700,
                color:T.text2, padding:"4px 2px",
              }}>
                {d.replace("週","")}
              </div>
            ))}
          </div>

          {/* Time grid */}
          <div style={{
            display:"grid",
            gridTemplateColumns:`${TIME_COL_W}px repeat(${activeDays.length},1fr)`,
          }}>
            {/* Time labels */}
            <div style={{ position:"relative", height:GRID_H }}>
              {hourLabels.map(h => (
                <div key={h} style={{
                  position:"absolute",
                  top: (h*60 - earliestMin) * PX_PER_MIN - 6,
                  right:4, fontSize:9, color:T.muted,
                  fontVariantNumeric:"tabular-nums", lineHeight:1,
                }}>
                  {String(h).padStart(2,"0")}:00
                </div>
              ))}
            </div>

            {/* Day columns */}
            {activeDays.map(day => {
              const dayCourses = semCourses.filter(c => c.day === day);
              return (
                <div key={day} style={{
                  position:"relative", height:GRID_H,
                  borderLeft:`1px solid ${T.border}`,
                }}>
                  {/* Hour lines */}
                  {hourLabels.map(h => (
                    <div key={h} style={{
                      position:"absolute",
                      top:(h*60 - earliestMin)*PX_PER_MIN,
                      left:0, right:0,
                      borderTop:`1px solid ${T.border}`,
                    }} />
                  ))}

                  {/* Course blocks */}
                  {dayCourses.map(c => {
                    const sMin = toMins(c.startTime);
                    const eRaw = toMins(c.endTime);
                    if (sMin === null) return null;
                    const durMin = (eRaw && eRaw > sMin) ? eRaw - sMin : 50;
                    const top    = (sMin - earliestMin) * PX_PER_MIN;
                    const height = Math.max(durMin * PX_PER_MIN, 18);
                    const col    = colorFor(c.id);

                    return (
                      <div key={c.id} style={{
                        position:"absolute",
                        top: top + 1, left:2, right:2,
                        height: height - 2,
                        background: col.bg,
                        border:`1.5px solid ${col.border}`,
                        borderRadius:5, padding:"2px 3px",
                        overflow:"hidden", boxSizing:"border-box", zIndex:1,
                      }}>
                        <div style={{
                          fontSize: Math.min(10, Math.max(8, height/5)),
                          fontWeight:700, color:col.text,
                          lineHeight:1.25, overflow:"hidden",
                          display:"-webkit-box",
                          WebkitLineClamp: Math.floor(height/12),
                          WebkitBoxOrient:"vertical",
                        }}>
                          {c.name}
                        </div>
                        {height > 32 && (
                          <div style={{fontSize:8,color:col.text,opacity:0.75,marginTop:1}}>
                            {c.startTime}{c.endTime?`~${c.endTime}`:""}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>

          {/* Bottom hour line */}
          <div style={{
            display:"grid",
            gridTemplateColumns:`${TIME_COL_W}px repeat(${activeDays.length},1fr)`,
            borderTop:`1px solid ${T.border}`,
          }}>
            <div style={{fontSize:9,color:T.muted,textAlign:"right",paddingRight:4,paddingTop:2}}>
              {String(latestMin/60).padStart(2,"0")}:00
            </div>
            {activeDays.map(d=><div key={d} style={{borderLeft:`1px solid ${T.border}`}} />)}
          </div>

        </div>
      </div>
    </div>
  );
}

function ExamsHomework({ data, setData }) {
  const [tab, setTab] = useState("考試");

  const [edit, setEdit] = useState(null);
  const [form, setForm] = useState({});

  const fileRef = useRef();

  const semCourseNames = courses.filter(c=>c.semester===semester).map(c=>c.name);
  const CUSTOM_OPT = "__custom__";

  const openExam = (item=null) => {
    const isCustom = item && item.subject && !semCourseNames.includes(item.subject);
    setCustomSubject(isCustom || false);
    if (item) { setEdit(item.id); setForm({name:item.name,subject:item.subject||"",time:item.time||"",note:item.note||""}); }
    else { setEdit(null); setForm({name:"",subject:semCourseNames[0]||"",time:"",note:""}); setCustomSubject(false); }
    setModal(true);
  };

  const openHW = (item=null) => {
    const isCustom = item && item.subject && !semCourseNames.includes(item.subject);
    setCustomSubject(isCustom || false);
    if (item) { setEdit(item.id); setForm({name:item.name,subject:item.subject||"",deadline:item.deadline||"",file:item.file||null,link:item.link||""}); }
    else { setEdit(null); setForm({name:"",subject:semCourseNames[0]||"",deadline:"",file:null,link:""}); setCustomSubject(false); }
    setModal(true);
  };

  const save = () => {
    const entry = { id:edit||uuid(), kind:tab, ...form };
    if (edit) setData(data.map(d=>d.id===edit?entry:d));
    else setData([...data,entry]);
    setModal(false);
  };

  });

          {customSubject?"從課程選擇":"自行輸入"}

        ? <Input value={form.subject||""} onChange={v=>setForm(f=>({...f,subject:v}))} placeholder="輸入科目名稱" />
        : <Select value={form.subject||""} onChange={v=>setForm(f=>({...f,subject:v}))}

  return (
    <div>
      <div style={{display:"flex",gap:0,marginBottom:16,background:T.bg3,borderRadius:12,padding:3}}>
        {["考試","作業"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{
            flex:1,padding:"8px",borderRadius:10,border:"none",cursor:"pointer",
            background:tab===t?T.card:"transparent",color:tab===t?T.text:T.text3,
            fontFamily:"inherit",fontWeight:700,fontSize:14,transition:"all 0.15s",
            boxShadow:tab===t?"0 1px 4px rgba(90,55,30,0.12)":"none",
          }}>{t==="考試"?"📝 ":"📋 "}{t}</button>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
        <Btn small onClick={()=>tab==="考試"?openExam():openHW()}>+ 新增</Btn>
      </div>
      {items.length===0 && <EmptyState icon={tab==="考試"?"📝":"📋"} text={`還沒有${tab}記錄`} />}
      {items.map(item=>(
        <Card key={item.id}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:T.text}}>{item.name}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>

              {item.file && <div style={{fontSize:12,color:T.text3,marginTop:4}}>📎 {item.file.name}</div>}

              <Btn small variant="ghost" onClick={()=>tab==="考試"?openExam(item):openHW(item)}>編輯</Btn>
              <Btn small variant="danger" onClick={()=>setData(data.filter(d=>d.id!==item.id))}>刪</Btn>
            </div>
          </div>
        </Card>
      ))}

      <Modal open={modal} onClose={()=>setModal(false)} title={`${edit?"編輯":"新增"}${tab}`}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>

            <div>

                />
              </div>
              {/* File upload */}
              <div style={{fontSize:12,color:T.text3,marginBottom:4}}>上傳檔案</div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <Btn variant="secondary" style={{flex:1}} onClick={()=>fileRef.current.click()}>
                  📂 {form.file ? "重新選擇" : "選擇檔案"}
                </Btn>
                {form.file && (
                  <Btn small variant="danger" onClick={()=>setForm(f=>({...f,file:null}))}>移除</Btn>
                )}
              </div>
              {form.file && (
                <div style={{fontSize:12,color:T.text3,marginTop:4,padding:"6px 10px",
                  background:T.bg2,borderRadius:8}}>

              }} />
            </div>
          </>}
          <Btn onClick={save}>儲存</Btn>
        </div>
      </Modal>
    </div>
  );
}

  return (
    <div>
      <SectionTitle right={<Btn small onClick={()=>open()}>+ 新增</Btn>}>🏆 活動經歷</SectionTitle>
      {data.length===0 && <EmptyState icon="🎉" text="記錄你的活動與經歷！" />}
      {[...data].sort((a,b)=>((b.startDatetime||b.datetime||"")>(a.startDatetime||a.datetime||""))?1:-1).map(item=>(
        <Card key={item.id}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:4}}>{item.name}</div>
              {(item.startDatetime||item.datetime) && (
                <div style={{fontSize:12,color:T.muted,marginBottom:4}}>
                  🕐 {fmtDT(item.startDatetime||item.datetime)}
                  {item.endDatetime && <span> ~ {fmtDT(item.endDatetime)}</span>}
                </div>
              )}
              {item.startDatetime && item.endDatetime && (() => {
                const mins = Math.round((new Date(item.endDatetime)-new Date(item.startDatetime))/60000);
                const h = Math.floor(mins/60), m = mins%60;
                return <Tag label={`共 ${h>0?h+"小時":""} ${m>0?m+"分":""}`.trim()} color={T.blue} />;
              })()}
              {item.note && <p style={{margin:"6px 0 0",fontSize:13,color:T.text2}}>{item.note}</p>}
            </div>
            <div style={{display:"flex",gap:4,marginLeft:8}}>
              <Btn small variant="ghost" onClick={()=>open(item)}>編輯</Btn>
              <Btn small variant="danger" onClick={()=>setData(data.filter(d=>d.id!==item.id))}>刪</Btn>
            </div>
          </div>
        </Card>
      ))}
      <Modal open={modal} onClose={()=>setModal(false)} title={edit?"編輯活動":"新增活動"}>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <Input value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="活動名稱" />
          <div>
            <div style={{fontSize:12,color:T.text3,marginBottom:4}}>開始時間</div>
            <Input type="datetime-local" value={form.startDatetime} onChange={v=>setForm(f=>({...f,startDatetime:v}))} />
          </div>
          <div>
            <div style={{fontSize:12,color:T.text3,marginBottom:4}}>結束時間</div>
            <Input type="datetime-local" value={form.endDatetime} onChange={v=>setForm(f=>({...f,endDatetime:v}))} />
          </div>
          <Textarea value={form.note} onChange={v=>setForm(f=>({...f,note:v}))} placeholder="備註（選填）" rows={3} />
          <Btn onClick={save}>儲存</Btn>
        </div>
      </Modal>
    </div>
  );
}

const TABS = [
  { id:"diary", label:"手帳本", icon:"📓" },
  { id:"plan", label:"計畫本", icon:"📋" },
  { id:"life", label:"生活本", icon:"🌿" },
